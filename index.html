<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f3ee;
    --surface: #eceae4;
    --border: #d4d0c8;
    --text: #1a1916;
    --muted: #888580;
    --accent: #1a1916;
    --tag-bg: #e0ddd6;
    --danger: #c0392b;
  }

  :root.dark {
    --bg: #1a1916;
    --surface: #222120;
    --border: #3a3835;
    --text: #f5f3ee;
    --muted: #888580;
    --accent: #f5f3ee;
    --tag-bg: #2e2c29;
    --danger: #e05c4a;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* TOP BAR */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .btn:hover { border-color: var(--text); color: var(--text); }
  .btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn.primary:hover { opacity: 0.8; }

  .btn.icon-btn {
    padding: 5px 9px;
    font-size: 13px;
    line-height: 1;
  }

  /* MAIN LAYOUT */
  .workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 200px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }

  .sidebar-section {
    padding: 16px 16px 8px;
  }

  .sidebar-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .notebook-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.12s;
    font-size: 13px;
    color: var(--text);
    user-select: none;
    position: relative;
  }

  .notebook-item:hover { background: var(--surface); }
  .notebook-item.active { background: var(--tag-bg); }
  .notebook-item.dragging { opacity: 0.35; }
  .notebook-item.drag-over { box-shadow: inset 0 2px 0 var(--accent); }
  .nb-split-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 13px; padding: 0 2px;
    opacity: 0; transition: opacity 0.15s; flex-shrink: 0; line-height: 1;
  }
  .notebook-item:hover .nb-split-btn { opacity: 1; }
  .nb-split-btn.split-active { opacity: 1; color: var(--accent); }
  .panel-close-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 16px; padding: 0 4px; line-height: 1;
  }
  .panel-close-btn:hover { color: var(--text); }
  .notes-area + .notes-area { border-left: 1px solid var(--border); }
  .color-swatch.color-used { opacity: 0.2; pointer-events: none; }

  .notebook-dot {
    flex-shrink: 0;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--nb-color);
    transition: background 0.2s;
  }

  .notebook-name {
    flex: 1;
    min-width: 0;
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .notebook-count {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .sidebar-sep {
    height: 1px;
    background: var(--border);
    margin: 8px 16px;
  }

  /* NOTE GRID */
  .notes-area {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .notes-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .notes-title {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #activeNotebookTitle {
    position: relative;
    padding-left: 18px;
  }
  #activeNotebookTitle::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--nb-dot-color, #888);
  }

  .notes-grid {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    overflow: hidden;
  }

  .note-card {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    transition: background 0.15s;
  }

  :root:not(.dark) .note-card:hover { background: #f8f6f1; }
  :root.dark .note-card:hover { background: #1e1d1a; }
  .note-card.dragging { opacity: 0.35; }
  .note-card.drag-over { box-shadow: inset 0 0 0 2px var(--accent); }
  .note-card.mic-active { box-shadow: inset 0 0 0 2px #FF1744; animation: cardpulse 1.2s ease-in-out infinite; }
  @keyframes cardpulse {
    0%,100% { box-shadow: inset 0 0 0 2px rgba(255,23,68,0.6); }
    50% { box-shadow: inset 0 0 0 2px rgba(255,23,68,1); }
  }
  .note-mic-btn {
    position: relative;
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 14px; padding: 3px 6px;
    opacity: 0; transition: opacity 0.15s, color 0.15s, background 0.15s;
    flex-shrink: 0; border-radius: 4px; margin-right: 6px;
  }
  .note-card:hover .note-mic-btn { opacity: 0.6; }
  .note-card:hover .note-mic-btn:hover { opacity: 1; background: var(--surface); }
  .note-mic-btn.recording,
  .note-card .note-mic-btn.recording,
  .note-card:hover .note-mic-btn.recording {
    opacity: 1 !important;
    color: #fff;
    background: #FF1744;
    box-shadow: 0 0 10px rgba(255,23,68,0.6);
    animation: micpulse 0.9s infinite;
  }
  @keyframes micpulse {
    0%,100% { box-shadow: 0 0 10px rgba(255,23,68,0.6); transform: scale(1); }
    50% { box-shadow: 0 0 18px rgba(255,23,68,0.9); transform: scale(1.1); }
  }
  .note-mic-btn.polishing,
  .note-card .note-mic-btn.polishing,
  .note-card:hover .note-mic-btn.polishing {
    opacity: 1 !important; color: #fff; background: #1565C0;
    box-shadow: 0 0 10px rgba(21,101,192,0.6);
    animation: micbreathe 1.4s ease-in-out infinite; cursor: default;
  }
  @keyframes micbreathe {
    0%,100% { box-shadow: 0 0 8px rgba(21,101,192,0.5); }
    50%      { box-shadow: 0 0 18px rgba(21,101,192,0.85); }
  }

  /* SMART RECORD BUTTON */
  .smart-record-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .smart-record-btn:hover { border-color: var(--text); color: var(--text); }
  .smart-record-btn.recording {
    background: #FF1744; color: #fff; border-color: #FF1744;
    box-shadow: 0 0 12px rgba(255,23,68,0.5);
    animation: smartpulse 0.9s infinite;
  }
  .smart-record-btn.processing {
    background: #7C4DFF; color: #fff; border-color: #7C4DFF;
    box-shadow: 0 0 12px rgba(124,77,255,0.5);
    animation: smartbreathe 1.4s ease-in-out infinite;
    cursor: default;
  }
  @keyframes smartpulse {
    0%,100% { box-shadow: 0 0 10px rgba(255,23,68,0.5); }
    50% { box-shadow: 0 0 22px rgba(255,23,68,0.85); }
  }
  @keyframes smartbreathe {
    0%,100% { box-shadow: 0 0 8px rgba(124,77,255,0.4); }
    50% { box-shadow: 0 0 20px rgba(124,77,255,0.8); }
  }

  .note-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }

  .note-title-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 0;
  }

  .note-color-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
    cursor: pointer;
  }

  .note-title {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--text);
    text-transform: uppercase;
    background: none;
    border: none;
    outline: none;
    width: 100%;
    cursor: text;
  }

  .note-menu-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 16px;
    padding: 0 2px;
    line-height: 1;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .note-card:hover .note-menu-btn { opacity: 1; }
  .note-clear-btn {
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 0.05em; text-transform: uppercase;
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 2px 8px; border-radius: 3px; cursor: pointer;
    opacity: 0; transition: opacity 0.15s, color 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .note-card:hover .note-clear-btn { opacity: 0.6; }
  .note-card:hover .note-clear-btn:hover { opacity: 1; color: var(--danger); border-color: var(--danger); }
  .note-delete-btn {
    background: none; border: 1px solid var(--border); cursor: pointer;
    font-size: 12px; padding: 2px 6px; border-radius: 3px;
    opacity: 0; transition: opacity 0.15s, border-color 0.15s, background 0.15s;
    flex-shrink: 0; color: var(--text);
  }
  .note-card:hover .note-delete-btn { opacity: 0.6; }
  .note-card:hover .note-delete-btn:hover { opacity: 1; border-color: var(--danger); background: rgba(192,57,43,0.1); }

  .note-body {
    flex: 1;
    padding: 14px 16px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .note-textarea {
    width: 100%;
    height: 100%;
    min-height: 80px;
    background: none;
    border: none;
    outline: none;
    resize: none;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 300;
    line-height: 1.8;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .note-textarea::placeholder { color: var(--muted); }
  .note-textarea:empty::before { content: attr(data-placeholder); color: var(--muted); pointer-events: none; display: block; }
  .note-textarea b, .note-textarea strong { font-weight: 900; color: #000; }
  :root.dark .note-textarea b, :root.dark .note-textarea strong { color: #fff; }

  /* CHECKLIST */
  .note-textarea .checklist-item {
    display: flex; align-items: flex-start; gap: 6px; margin: 2px 0;
  }
  .note-textarea .checklist-item input[type="checkbox"] {
    margin-top: 4px; cursor: pointer; flex-shrink: 0;
    accent-color: var(--accent);
  }
  .note-textarea .checklist-item.checked span {
    text-decoration: line-through; opacity: 0.5;
  }

  /* LIST BUTTON (AI organize) */
  .note-list-btn {
    position: relative;
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 13px; padding: 3px 6px;
    opacity: 0; transition: opacity 0.15s, color 0.15s, background 0.15s;
    flex-shrink: 0; border-radius: 4px; margin-right: 2px;
  }
  .note-card:hover .note-list-btn { opacity: 0.6; }
  .note-card:hover .note-list-btn:hover { opacity: 1; background: var(--surface); }
  .note-list-btn.processing {
    opacity: 1 !important; color: #fff; background: #7C4DFF;
    box-shadow: 0 0 10px rgba(124,77,255,0.5);
    animation: micbreathe 1.4s ease-in-out infinite; cursor: default;
  }

  .format-toolbar {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    display: none;
    gap: 2px;
    padding: 4px;
    z-index: 500;
    transform: translateX(-50%);
  }
  .format-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 4px;
    color: var(--text);
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }
  .format-btn:hover { background: var(--border); }

  .note-footer {
    padding: 8px 16px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    min-height: 36px;
    flex-shrink: 0;
  }

  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.04em;
    background: var(--tag-bg);
    color: var(--muted);
    padding: 2px 8px;
    border-radius: 3px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .tag .remove-tag {
    cursor: pointer;
    font-size: 11px;
    line-height: 1;
    color: var(--muted);
  }

  .tag .remove-tag:hover { color: var(--danger); }

  .tag-input {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    background: none;
    border: none;
    outline: none;
    color: var(--muted);
    width: 60px;
  }

  /* COLOR PICKER POPUP */
  .color-picker-popup {
    position: absolute;
    top: 44px;
    left: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    width: 144px;
    z-index: 100;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }

  .color-swatch {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.12s, border-color 0.12s;
  }

  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.selected { border-color: var(--text); }

  /* CONTEXT MENU */
  .ctx-menu {
    position: fixed;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px;
    z-index: 200;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    min-width: 140px;
  }

  .ctx-item {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    padding: 7px 12px;
    border-radius: 5px;
    cursor: pointer;
    color: var(--text);
    transition: background 0.1s;
  }

  .ctx-item:hover { background: var(--surface); }
  .ctx-item.danger { color: var(--danger); }

  /* MODAL */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
  }

  .modal {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    width: 320px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }

  .modal-title {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 16px;
    color: var(--muted);
  }

  .modal input {
    width: 100%;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 9px 12px;
    outline: none;
    color: var(--text);
    margin-bottom: 12px;
    transition: border-color 0.15s;
  }

  .modal input:focus { border-color: var(--text); }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 4px;
  }

  .hidden { display: none !important; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* tag pill visual distinction */
  .tag {
    display: inline-flex; align-items: center; gap: 3px;
    background: var(--accent); color: var(--bg);
    font-size: 10px; font-weight: 700; letter-spacing: 0.07em;
    text-transform: uppercase; padding: 2px 8px 2px 8px;
    border-radius: 99px; line-height: 1.6;
  }
  .remove-tag { color: rgba(128,128,128,0.75); font-size: 13px; line-height: 1; cursor: pointer; }
  .remove-tag:hover { color: var(--danger); }
  #lastUpdated {
    position: fixed;
    bottom: 10px;
    left: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.04em;
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:14px">
    <span class="logo">notes</span>
    <button class="smart-record-btn" id="smartRecordBtn" title="Smart record (Space+R)">● Record</button>
  </div>
  <div class="header-actions">
    <button class="btn icon-btn" id="darkModeBtn" title="Toggle dark mode">☀️</button>
    <button class="btn" id="addNotebookBtn">+ notebook</button>
    <button class="btn primary" id="addNoteBtn">+ note</button>
  </div>
</header>

<div class="workspace">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Notebooks</div>
      <div id="notebookList"></div>
    </div>
  </aside>

  <!-- NOTES AREA -->
  <div class="notes-area" id="primaryNotesArea">
    <div class="notes-topbar">
      <div class="notes-title">
        <span id="activeNotebookTitle"></span>
      </div>
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)" id="noteCountLabel"></div>
    </div>
    <div class="notes-grid" id="notesGrid"></div>
  </div>
  <!-- SECONDARY NOTES AREA -->
  <div class="notes-area" id="secondaryNotesArea" style="display:none">
    <div class="notes-topbar">
      <div class="notes-title">
        <span id="activeNotebookTitle2"></span>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)" id="noteCountLabel2"></div>
        <button class="panel-close-btn" id="closePanelBtn" title="Close panel">×</button>
      </div>
    </div>
    <div class="notes-grid" id="notesGrid2"></div>
  </div>
</div>

<!-- COLOR PICKER -->
<div class="color-picker-popup hidden" id="colorPicker"></div>

<!-- CONTEXT MENU -->
<div class="ctx-menu hidden" id="ctxMenu"></div>

<!-- LAST UPDATED -->
<div id="lastUpdated">updated —</div>

<!-- FORMAT TOOLBAR -->
<div class="format-toolbar" id="formatToolbar">
  <button class="format-btn" id="fmtBold" title="Gras" style="font-weight:900; color:#111; font-size:14px;">G</button>
  <button class="format-btn" id="fmtUnderline" title="Souligné"><u style="text-underline-offset:3px;">S</u></button>
  <button class="format-btn" id="fmtBullet" title="Liste à puces" style="font-size:22px; line-height:1;">•</button>
  <button class="format-btn" id="fmtCheck" title="Checklist" style="font-size:13px; line-height:1;">☑</button>
</div>

<!-- MODAL -->
<div class="overlay hidden" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-title" id="modalTitle">New Notebook</div>
    <input type="text" id="modalInput" placeholder="Name..." autocomplete="off" />
    <div class="modal-actions">
      <button class="btn" id="modalCancel">Cancel</button>
      <button class="btn primary" id="modalConfirm">Create</button>
    </div>
  </div>
</div>

<script>
// — PALETTE ——————————————————————————————
const COLORS = [
  '#FF1744','#2979FF','#00E676','#FF6D00','#D500F9',
  '#00E5FF','#FFEA00','#FF4081','#76FF03','#1DE9B6',
  '#FF3D00','#3D5AFE','#00B0FF','#F50057','#69F0AE',

// — STATE ———————————————————————————————
let state = loadState() || {
  notebooks: [
    { id: 'n1', name: 'TBP', color: COLORS[0] },
    { id: 'n2', name: 'YBP', color: COLORS[3] },
    { id: 'n3', name: 'WPP', color: COLORS[2] },
    { id: 'n4', name: 'Cloud', color: COLORS[4] },
  ],
  notes: {
    n1: [makeNote()],
    n2: [makeNote()],
    n3: [makeNote()],
    n4: [makeNote()],
  },
  activeNotebook: 'n1',
  secondaryNotebook: null
};

function makeNote(text='', tags=[]) {
  return { id: uid(), title: '', text, tags };
}

function uid() { return Math.random().toString(36).slice(2,9); }

//  migrate existing saved data: strip trailing empty notes 
(function migrateNotes() {
  for (const nbId in state.notes) {
    const arr = state.notes[nbId];
    if (!arr || arr.length === 0) { state.notes[nbId] = [makeNote()]; continue; }
    while (arr.length > 1 && !(arr[arr.length - 1].text || '').trim()) arr.pop();
  }
  if (typeof state.activeNote !== 'number') state.activeNote = 0;
  if (typeof state.activeNotebook === 'undefined') state.activeNotebook = state.notebooks[0].id;
})();

// — UNDO / REDO HISTORY ——————————————————
const undoStack = [];
const redoStack = [];
const MAX_UNDO = 50;
let undoLock = false;

function syncDomToState() {
  document.querySelectorAll('.note-textarea').forEach(ta => {
    const noteId = ta.closest('[data-note-id]')?.dataset.noteId;
    if (!noteId) return;
    for (const nbId of [state.activeNotebook, state.secondaryNotebook]) {
      if (!nbId) continue;
      const note = state.notes[nbId]?.find(n => n.id === noteId);
      if (note) { note.text = ta.innerHTML; break; }
    }
  });
}

function snapshotForUndo() {
  if (undoLock) return;
  syncDomToState();
  undoStack.push(JSON.stringify(state));
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack.length = 0;
}

function undo() {
  if (!undoStack.length) return;
  undoLock = true;
  syncDomToState();
  redoStack.push(JSON.stringify(state));
  const prev = JSON.parse(undoStack.pop());
  state.notebooks = prev.notebooks;
  state.notes = prev.notes;
  state.activeNotebook = prev.activeNotebook;
  state.secondaryNotebook = prev.secondaryNotebook;
  try { localStorage.setItem('notes_app_v2', JSON.stringify(state)); } catch {}
  render();
  undoLock = false;
}

function redo() {
  if (!redoStack.length) return;
  undoLock = true;
  syncDomToState();
  undoStack.push(JSON.stringify(state));
  const next = JSON.parse(redoStack.pop());
  state.notebooks = next.notebooks;
  state.notes = next.notes;
  state.activeNotebook = next.activeNotebook;
  state.secondaryNotebook = next.secondaryNotebook;
  try { localStorage.setItem('notes_app_v2', JSON.stringify(state)); } catch {}
  render();
  undoLock = false;
}

function saveState() {
  document.querySelectorAll('.note-textarea').forEach(ta => {
    const noteId = ta.closest('[data-note-id]')?.dataset.noteId;
    if (!noteId) return;
    for (const nbId of [state.activeNotebook, state.secondaryNotebook]) {
      if (!nbId) continue;
      const note = state.notes[nbId]?.find(n => n.id === noteId);
      if (note) { note.text = ta.innerHTML; break; }
    }
  });
  try { localStorage.setItem('notes_app_v2', JSON.stringify(state)); } catch {}
}

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem('notes_app_v2'));
    if (!s || !Array.isArray(s.notebooks) || s.notebooks.length === 0 || !s.notes) return null;
    return s;
  } catch { return null; }
}

// — RENDER SIDEBAR ————————————————————————
function renderSidebar() {
  const list = document.getElementById('notebookList');
  list.innerHTML = '';
  let nbDragSrcId = null;
  state.notebooks.forEach(nb => {
    const div = document.createElement('div');
    div.className = 'notebook-item' + (nb.id === state.activeNotebook ? ' active' : '');
    div.draggable = true;
    div.dataset.id = nb.id;
    const count = (state.notes[nb.id] || []).filter(n=>n.text.trim()).length;
    const isSplit = nb.id === state.secondaryNotebook;
    div.innerHTML = `
      <div class="notebook-dot" style="background:${nb.color}"></div>
      <span class="notebook-name">${escHtml(nb.name)}</span>
      <span class="notebook-count">${count}</span>
      <button class="nb-split-btn${isSplit ? ' split-active' : ''}" title="Open beside">⊞</button>
    `;
    div.addEventListener('click', (e) => {
      if (e.target.closest('.notebook-dot')) { showColorPicker(e.target.closest('.notebook-dot'), nb); return; }
      if (e.target.closest('.nb-split-btn')) {
        state.secondaryNotebook = isSplit ? null : nb.id;
        saveState(); render(); return;
      }
      state.activeNotebook = nb.id; state.activeNote = 0; saveState(); render();
    });
    div.addEventListener('contextmenu', e => { e.preventDefault(); showNotebookCtx(e, nb); });

    div.addEventListener('dragstart', e => {
      nbDragSrcId = nb.id;
      setTimeout(() => div.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    div.addEventListener('dragend', () => {
      div.classList.remove('dragging');
      list.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    });
    div.addEventListener('dragover', e => {
      e.preventDefault();
      if (nbDragSrcId !== nb.id) div.classList.add('drag-over');
    });
    div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
    div.addEventListener('drop', e => {
      e.preventDefault();
      div.classList.remove('drag-over');
      if (nbDragSrcId === nb.id) return;
      const fromIdx = state.notebooks.findIndex(n => n.id === nbDragSrcId);
      const toIdx = state.notebooks.findIndex(n => n.id === nb.id);
      state.notebooks.splice(toIdx, 0, state.notebooks.splice(fromIdx, 1)[0]);
      saveState(); renderSidebar();
    });

    list.appendChild(div);
  });
}

// — RENDER NOTES GRID —————————————————————
function renderPanel(nbId, gridEl, titleEl, countEl) {
  const nb = state.notebooks.find(n => n.id === nbId);
  if (!nb) return;

  titleEl.textContent = nb.name;
  titleEl.style.setProperty('--nb-dot-color', nb.color);

  const notes = state.notes[nb.id] || [];
  countEl.textContent = notes.filter(n => n.text.trim()).length + ' entries';

  gridEl.innerHTML = '';
  let dragSrcId = null;

  notes.forEach((note, idx) => {
    const card = document.createElement('div');
    card.className = 'note-card';
    card.dataset.noteId = note.id;
    card.dataset.idx = idx;

    card.innerHTML = `
      <div class="note-header" draggable="true">
        <div class="note-title-wrap">
          <div class="note-color-dot" style="background:${nb.color}"></div>
          <input class="note-title" value="${escHtml(note.title || 'Note ' + (idx+1))}" spellcheck="false" />
        </div>
        <button class="note-list-btn" title="AI organize as checklist">☑</button>
        <button class="note-mic-btn" title="Voice to text">🎤</button>
        <button class="note-clear-btn" title="Clear note">clear</button>
        <button class="note-delete-btn" title="Delete note">🗑</button>
      </div>
      <div class="note-body">
        <div class="note-textarea" contenteditable="true" spellcheck="false" data-placeholder="${PLACEHOLDERS[idx % PLACEHOLDERS.length]}"></div>
      </div>
    `;

    const titleInput = card.querySelector('.note-title');
    titleInput.addEventListener('input', () => { note.title = titleInput.value; debounceSave(); });

    const ta = card.querySelector('.note-textarea');
    ta.innerHTML = note.text;
    ta.addEventListener('input', () => { note.text = ta.innerHTML; debounceSave(); });

    // Backspace in checklist — remove empty item in one press
    ta.addEventListener('keydown', e => {
      if (e.key === 'Backspace') {
        const sel = window.getSelection();
        const anchor = sel?.anchorNode;
        const el = anchor?.nodeType === Node.TEXT_NODE ? anchor.parentElement : anchor;
        const item = el?.closest('.checklist-item');
        if (!item) return;
        const span = item.querySelector('span');
        const text = span ? span.textContent.replace(/\u200B/g, '').trim() : '';
        if (text === '') {
          e.preventDefault();
          const prev = item.previousElementSibling;
          item.remove();
          // move cursor to end of previous item or start of textarea
          if (prev && prev.classList.contains('checklist-item')) {
            const prevSpan = prev.querySelector('span');
            if (prevSpan) {
              const range = document.createRange();
              range.selectNodeContents(prevSpan);
              range.collapse(false);
              sel.removeAllRanges();
              sel.addRange(range);
            }
          }
          note.text = ta.innerHTML;
          debounceSave();
        }
        return;
      }
      if (e.key !== 'Enter') return;
      // find if cursor is in or near a checklist item
      const sel = window.getSelection();
      const anchor = sel?.anchorNode;
      const el = anchor?.nodeType === Node.TEXT_NODE ? anchor.parentElement : anchor;
      const item = el?.closest('.checklist-item');
      // also check if textarea contains any checklist items at all
      const hasChecklist = ta.querySelector('.checklist-item');
      if (!item && !hasChecklist) return; // no checklist, let default Enter work

      e.preventDefault();
      const newItem = document.createElement('div');
      newItem.className = 'checklist-item';
      newItem.innerHTML = '<input type="checkbox"><span>\u200B</span>';

      if (item) {
        item.after(newItem);
      } else {
        // cursor is outside checklist items but checklist exists — append after last one
        const allItems = ta.querySelectorAll('.checklist-item');
        const lastItem = allItems[allItems.length - 1];
        if (lastItem) lastItem.after(newItem);
        else ta.appendChild(newItem);
      }

      // place cursor in the new span
      const span = newItem.querySelector('span');
      const range = document.createRange();
      range.setStart(span, 0);
      range.collapse(true);
      sel.removeAllRanges();
      sel.addRange(range);
      note.text = ta.innerHTML;
      debounceSave();
    });

    // checkbox toggle — click checkbox to strike through
    ta.addEventListener('change', e => {
      if (e.target.type === 'checkbox') {
        const item = e.target.closest('.checklist-item');
        if (item) { item.classList.toggle('checked', e.target.checked); note.text = ta.innerHTML; debounceSave(); }
      }
    });

    // AI list button — organize note content as checklist
    const listBtn = card.querySelector('.note-list-btn');
    listBtn.addEventListener('click', e => {
      e.stopPropagation();
      if (listBtn.classList.contains('processing')) return;
      const content = ta.innerHTML.trim();
      if (!content || content === '<br>') return;
      listBtn.classList.add('processing');
      snapshotForUndo();
      fetch('https://notes-polish.dcop14c.workers.dev', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: content, mode: 'checklist' }),
        signal: AbortSignal.timeout(20000),
      })
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(data => {
          if (data.content) {
            ta.innerHTML = data.content;
            note.text = ta.innerHTML;
            debounceSave();
          }
        })
        .catch(() => {})
        .finally(() => listBtn.classList.remove('processing'));
    });

    // mic / speech-to-text
    const micBtn = card.querySelector('.note-mic-btn');
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { micBtn.style.display = 'none'; } else {
      micBtn.addEventListener('click', e => {
        e.stopPropagation();
        if (micBtn.classList.contains('polishing')) return;

        // — stop active recording, polish accumulated transcript —
        if (window._activeRec && window._activeMicBtn === micBtn) {
          window._activeRec.stop(); // triggers onend → polishes
          return;
        }
        if (window._activeRec) {
          window._activeRec.stop();
          if (window._activeMicBtn) window._activeMicBtn.classList.remove('recording');
          window._activeRec = null; window._activeMicBtn = null;
        }
        // Cancel smart record if active
        if (window._smartRec) {
          window._smartRec.onend = () => {};
          window._smartRec.stop();
          window._smartRec = null;
          document.getElementById('smartRecordBtn').classList.remove('recording');
        }

        const rec = new SR();
        rec.continuous = true;
        rec.interimResults = true;
        rec.lang = 'en-US';
        let transcript = '';
        let silenceTimer = null;

        const resetSilenceTimer = () => {
          clearTimeout(silenceTimer);
          silenceTimer = setTimeout(() => { if (window._activeRec === rec) rec.stop(); }, 1000);
        };

        rec.onresult = ev => {
          for (let i = ev.resultIndex; i < ev.results.length; i++) {
            if (ev.results[i].isFinal) transcript += ev.results[i][0].transcript + ' ';
          }
          resetSilenceTimer();
        };

        rec.onend = () => {
          clearTimeout(silenceTimer);
          micBtn.classList.remove('recording');
          card.classList.remove('mic-active');
          window._activeRec = null; window._activeMicBtn = null;
          const text = transcript.trim();
          if (!text) return;
          micBtn.classList.add('polishing');
          snapshotForUndo();

          const currentContent = ta.innerHTML.trim();
          const hasContent = currentContent && currentContent !== '<br>';

          if (hasContent) {
            // Note has content → AI edit mode
            fetch('https://notes-polish.dcop14c.workers.dev', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text, mode: 'note-edit', noteContent: currentContent }),
              signal: AbortSignal.timeout(20000),
            })
              .then(r => r.ok ? r.json() : Promise.reject())
              .then(data => {
                if (data.content) {
                  ta.innerHTML = data.content;
                  note.text = ta.innerHTML;
                  debounceSave();
                }
              })
              .catch(() => {
                // Fallback: just append polished text
                ta.focus();
                document.execCommand('insertText', false, text + ' ');
                note.text = ta.innerHTML;
                debounceSave();
              })
              .finally(() => micBtn.classList.remove('polishing'));
          } else {
            // Empty note → simple polish + insert
            const insertText = str => {
              ta.focus();
              document.execCommand('insertText', false, str + ' ');
              note.text = ta.innerHTML;
              debounceSave();
            };
            fetch('https://notes-polish.dcop14c.workers.dev', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text }),
              signal: AbortSignal.timeout(15000),
            })
              .then(r => r.ok ? r.json() : Promise.reject())
              .then(data => insertText(data.polished || text))
              .catch(() => insertText(text))
              .finally(() => micBtn.classList.remove('polishing'));
          }
        };
        rec.onerror = () => {
          micBtn.classList.remove('recording');
          card.classList.remove('mic-active');
          window._activeRec = null; window._activeMicBtn = null;
        };

        transcript = '';
        micBtn.classList.add('recording');
        card.classList.add('mic-active');
        window._activeRec = rec; window._activeMicBtn = micBtn;
        rec.start();
      });
    }

    card.querySelector('.note-clear-btn').addEventListener('click', e => {
      e.stopPropagation();
      snapshotForUndo();
      note.text = '';
      note.title = '';
      note.tags = [];
      ta.innerHTML = '';
      titleInput.value = 'Note ' + (idx + 1);
      saveState();
    });

    card.querySelector('.note-delete-btn').addEventListener('click', e => {
      e.stopPropagation();
      snapshotForUndo();
      const arr = state.notes[nb.id];
      if (arr.length > 1) {
        state.notes[nb.id] = arr.filter(n => n.id !== note.id);
      } else {
        state.notes[nb.id] = [makeNote()];
      }
      saveState(); renderNotes();
    });

    card.querySelector('.note-header').addEventListener('dragstart', e => {
      dragSrcId = note.id;
      setTimeout(() => card.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      gridEl.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    });
    card.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (dragSrcId !== note.id) card.classList.add('drag-over');
    });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drag-over');
      if (dragSrcId === note.id) return;
      const arr = state.notes[nb.id];
      const fromIdx = arr.findIndex(n => n.id === dragSrcId);
      const toIdx = arr.findIndex(n => n.id === note.id);
      arr.splice(toIdx, 0, arr.splice(fromIdx, 1)[0]);
      saveState(); renderNotes();
    });

    gridEl.appendChild(card);
  });
}

function renderNotes() {
  renderPanel(state.activeNotebook,
    document.getElementById('notesGrid'),
    document.getElementById('activeNotebookTitle'),
    document.getElementById('noteCountLabel'));

  const secArea = document.getElementById('secondaryNotesArea');
  if (state.secondaryNotebook) {
    secArea.style.display = 'flex';
    renderPanel(state.secondaryNotebook,
      document.getElementById('notesGrid2'),
      document.getElementById('activeNotebookTitle2'),
      document.getElementById('noteCountLabel2'));
  } else {
    secArea.style.display = 'none';
  }
}

// — COLOR PICKER ——————————————————————————
let colorPickerTarget = null;
function showColorPicker(anchor, nb) {
  const picker = document.getElementById('colorPicker');
  picker.innerHTML = '';
  const usedColors = state.notebooks.filter(n => n.id !== nb.id).map(n => n.color);
  COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (nb.color===c?' selected':'') + (usedColors.includes(c)?' color-used':'');
    sw.style.background = c;
    sw.addEventListener('click', e => {
      e.stopPropagation();
      nb.color = c;
      saveState(); render();
      picker.classList.add('hidden');
    });
    picker.appendChild(sw);
  });

  const rect = anchor.getBoundingClientRect();
  picker.style.left = rect.left + 'px';
  picker.style.top = (rect.bottom + 6) + 'px';
  picker.classList.remove('hidden');
  colorPickerTarget = nb;
}

// — CONTEXT MENUS —————————————————————————
function showNotebookCtx(e, nb) {
  const menu = document.getElementById('ctxMenu');
  menu.innerHTML = `
    <div class="ctx-item" id="ctx-rename">Rename</div>
    <div class="ctx-item danger" id="ctx-delete-nb">Delete notebook</div>
  `;
  posCtx(menu, e.clientX, e.clientY);

  document.getElementById('ctx-rename').onclick = () => {
    hideCtx();
    showModal('Rename Notebook', nb.name, val => {
      if (val) { nb.name = val; saveState(); render(); }
    });
  };

  document.getElementById('ctx-delete-nb').onclick = () => {
    hideCtx();
    if (state.notebooks.length <= 1) return;
    snapshotForUndo();
    state.notebooks = state.notebooks.filter(n=>n.id!==nb.id);
    delete state.notes[nb.id];
    state.activeNotebook = state.notebooks[0].id;
    saveState(); render();
  };
}

function showNoteCtx(e, note, nbId) {
  const menu = document.getElementById('ctxMenu');
  menu.innerHTML = `<div class="ctx-item danger" id="ctx-clear">Clear note</div>`;
  posCtx(menu, e.clientX, e.clientY);
  document.getElementById('ctx-clear').onclick = () => {
    hideCtx();
    snapshotForUndo();
    note.text = ''; note.tags = [];
    const ta = document.querySelector(`[data-note-id="${note.id}"] .note-textarea`);
    if (ta) ta.innerHTML = '';
    saveState(); renderNotes();
  };
}

function posCtx(menu, x, y) {
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
  menu.classList.remove('hidden');
}

function hideCtx() { document.getElementById('ctxMenu').classList.add('hidden'); }

// — MODAL ————————————————————————————————
let modalCb = null;
function showModal(title, defaultVal, cb) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalInput').value = defaultVal || '';
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('modalInput').focus();
  modalCb = cb;
}

function hideModal() { document.getElementById('overlay').classList.add('hidden'); modalCb = null; }

document.getElementById('modalConfirm').onclick = () => {
  const val = document.getElementById('modalInput').value.trim();
  if (modalCb) modalCb(val);
  hideModal();
};

document.getElementById('modalCancel').onclick = hideModal;
document.getElementById('overlay').addEventListener('click', e => { if (e.target.id==='overlay') hideModal(); });
document.getElementById('modalInput').addEventListener('keydown', e => {
  if (e.key==='Enter') document.getElementById('modalConfirm').click();
  if (e.key==='Escape') hideModal();
});

// — TOOLBAR ACTIONS ———————————————————————
document.getElementById('addNotebookBtn').onclick = () => {
  showModal('New Notebook', '', val => {
    if (!val) return;
    const id = uid();
    const usedC = state.notebooks.map(n => n.color);
    const color = COLORS.find(c => !usedC.includes(c)) || COLORS[state.notebooks.length % COLORS.length];
    state.notebooks.push({ id, name: val, color });
    state.notes[id] = [makeNote()];
    state.activeNotebook = id;
    saveState(); render();
  });
};

document.getElementById('addNoteBtn').onclick = () => {
  const nb = state.notebooks.find(n=>n.id===state.activeNotebook);
  if (!nb) return;
  state.notes[nb.id].unshift(makeNote());
  saveState(); renderNotes();
};

// — KEYBOARD SHORTCUTS ————————————————————
(function() {
  let spaceHeld = false;
  document.addEventListener('keydown', e => {
    // Ctrl+Z → undo, Ctrl+Y → redo
    if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
      e.preventDefault();
      undo();
      return;
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'y') {
      e.preventDefault();
      redo();
      return;
    }
    if (e.target.closest('input, [contenteditable]')) return;
    if (e.code === 'Space') { spaceHeld = true; e.preventDefault(); }
    if (spaceHeld && (e.key === 'r' || e.key === 'R')) {
      e.preventDefault();
      document.getElementById('smartRecordBtn').click();
      spaceHeld = false;
    }
  });
  document.addEventListener('keyup', e => {
    if (e.code === 'Space') spaceHeld = false;
  });
})();

// — CLOSE POPUPS —————————————————————————
document.addEventListener('click', e => {
  if (!e.target.closest('[data-color-trigger]') && !e.target.closest('#colorPicker') && !e.target.closest('.notebook-dot'))
    document.getElementById('colorPicker').classList.add('hidden');
  if (!e.target.closest('.note-menu-btn') && !e.target.closest('#ctxMenu') &&
      !e.target.closest('.notebook-item') )
    hideCtx();
});

document.addEventListener('contextmenu', e => {
  if (!e.target.closest('.notebook-item')) e.preventDefault();
});

// — DEBOUNCE ——————————————————————————————
let saveTimer;
function debounceSave() { clearTimeout(saveTimer); saveTimer = setTimeout(saveState, 600); }

// — HELPERS ———————————————————————————————
function escHtml(s='') {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// strip any leftover Upgrade notebook from previous versions
state.notebooks = state.notebooks.filter(nb => nb.name !== '⚡ Upgrade');

// — FORMAT TOOLBAR ————————————————————————
(function() {
  const toolbar = document.getElementById('formatToolbar');

  function getSelectionInNote() {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || !sel.toString().trim()) return null;
    const node = sel.anchorNode;
    const el = node?.nodeType === Node.TEXT_NODE ? node.parentElement : node;
    if (!el?.closest('.note-textarea')) return null;
    return sel;
  }

  function positionToolbar() {
    const sel = getSelectionInNote();
    if (!sel) { toolbar.style.display = 'none'; return; }
    const rect = sel.getRangeAt(0).getBoundingClientRect();
    toolbar.style.display = 'flex';
    toolbar.style.left = (rect.left + rect.width / 2) + 'px';
    toolbar.style.top = (rect.top + window.scrollY - 44) + 'px';
  }

  document.addEventListener('mouseup', positionToolbar);
  document.addEventListener('keyup', e => {
    if (e.shiftKey || e.key === 'Shift' || (e.key === 'a' && (e.ctrlKey || e.metaKey))) positionToolbar();
  });
  document.addEventListener('selectionchange', () => {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed) toolbar.style.display = 'none';
  });

  function fmtBtn(id, cmd) {
    document.getElementById(id).addEventListener('mousedown', e => {
      e.preventDefault();
      document.execCommand(cmd);
      positionToolbar();
    });
  }
  fmtBtn('fmtBold', 'bold');
  fmtBtn('fmtUnderline', 'underline');
  document.getElementById('fmtBullet').addEventListener('mousedown', e => {
    e.preventDefault();
    document.execCommand('insertUnorderedList');
    toolbar.style.display = 'none';
  });
  document.getElementById('fmtCheck').addEventListener('mousedown', e => {
    e.preventDefault();
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed) return;
    const text = sel.toString();
    const lines = text.split('\n').filter(l => l.trim());
    const html = lines.map(l =>
      `<div class="checklist-item"><input type="checkbox"><span>${l.trim()}</span></div>`
    ).join('');
    document.execCommand('insertHTML', false, html);
    toolbar.style.display = 'none';
  });
})();

document.getElementById('closePanelBtn').addEventListener('click', () => {
  state.secondaryNotebook = null;
  saveState(); render();
});

// — LAST UPDATED ——————————————————————————
Promise.all([
  fetch('https://api.github.com/repos/domeniccop17/notes/commits?per_page=1').then(r => r.json()).then(d => new Date(d[0].commit.committer.date)).catch(() => new Date(0)),
  fetch('https://api.github.com/repos/domeniccop17/notes-polish/commits?per_page=1').then(r => r.json()).then(d => new Date(d[0].commit.committer.date)).catch(() => new Date(0)),
]).then(([notesDate, polishDate]) => {
  const d = notesDate > polishDate ? notesDate : polishDate;
  if (d.getTime() === 0) return;
  const fmt = d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0') + ' ' +
    String(d.getHours()).padStart(2,'0') + ':' +
    String(d.getMinutes()).padStart(2,'0') + ':' +
    String(d.getSeconds()).padStart(2,'0');
  document.getElementById('lastUpdated').textContent = 'updated ' + fmt;
}).catch(() => {});

// — SMART RECORD —————————————————————————
(function() {
  const btn = document.getElementById('smartRecordBtn');
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { btn.style.display = 'none'; return; }

  btn.addEventListener('click', () => {
    if (btn.classList.contains('processing')) return;

    // Stop smart recording
    if (window._smartRec) {
      window._smartRec.stop();
      return;
    }

    // Stop any per-note mic recording
    if (window._activeRec) {
      window._activeRec.stop();
      if (window._activeMicBtn) window._activeMicBtn.classList.remove('recording');
      window._activeRec = null; window._activeMicBtn = null;
    }

    const rec = new SR();
    rec.continuous = true;
    rec.interimResults = true;
    rec.lang = 'en-US';
    let transcript = '';
    let silenceTimer = null;

    const resetSilenceTimer = () => {
      clearTimeout(silenceTimer);
      silenceTimer = setTimeout(() => { if (window._smartRec === rec) rec.stop(); }, 1000);
    };

    rec.onresult = ev => {
      for (let i = ev.resultIndex; i < ev.results.length; i++) {
        if (ev.results[i].isFinal) transcript += ev.results[i][0].transcript + ' ';
      }
      resetSilenceTimer();
    };

    rec.onend = () => {
      clearTimeout(silenceTimer);
      btn.classList.remove('recording');
      window._smartRec = null;
      const text = transcript.trim();
      if (!text) return;

      btn.classList.add('processing');
      snapshotForUndo();
      const nbNames = state.notebooks.map(n => n.name);
      const activeNb = state.notebooks.find(n => n.id === state.activeNotebook);
      const activeNotes = (state.notes[state.activeNotebook] || []).map(n => ({
        title: n.title || '',
        content: n.text || ''
      }));

      const payload = {
        text,
        mode: 'smart',
        notebooks: nbNames,
        activeNotebook: activeNb ? activeNb.name : '',
        activeNotes
      };
      fetch('https://notes-polish.dcop14c.workers.dev', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
        signal: AbortSignal.timeout(20000),
      })
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(data => {
          // ── EDIT existing note ──
          if (data.action === 'edit' || (data.noteIndex !== undefined && data.content)) {
            const idx = data.noteIndex ?? 0;
            const notes = state.notes[state.activeNotebook] || [];
            const target = notes[idx] || notes.find(n => n.text.trim());
            if (target) {
              target.text = data.content;
              if (data.title) target.title = data.title;
            }
            // render first (rebuilds DOM from state), then save
            render();
            saveState();
            return;
          }

          // ── If AI returned content but no action, and current notebook has notes → treat as edit on first non-empty note ──
          if (!data.action && data.content && !data.notebook) {
            const notes = state.notes[state.activeNotebook] || [];
            const target = notes.find(n => n.text.trim());
            if (target) {
              target.text = data.content;
              if (data.title) target.title = data.title;
              render();
              saveState();
              return;
            }
          }

          // ── CREATE new note ──
          let nbId;
          const nbName = data.notebook;

          if (!nbName || data.isNew) {
            const name = nbName || 'Voice Notes';
            const existing = state.notebooks.find(n => n.name.toLowerCase() === name.toLowerCase());
            if (existing) {
              nbId = existing.id;
            } else {
              nbId = uid();
              const usedC = state.notebooks.map(n => n.color);
              const color = COLORS.find(c => !usedC.includes(c)) || COLORS[state.notebooks.length % COLORS.length];
              state.notebooks.push({ id: nbId, name, color });
              state.notes[nbId] = [];
            }
          } else {
            const existing = state.notebooks.find(n => n.name.toLowerCase() === nbName.toLowerCase());
            if (existing) {
              nbId = existing.id;
            } else {
              nbId = uid();
              const usedC = state.notebooks.map(n => n.color);
              const color = COLORS.find(c => !usedC.includes(c)) || COLORS[state.notebooks.length % COLORS.length];
              state.notebooks.push({ id: nbId, name: nbName, color });
              state.notes[nbId] = [];
            }
          }

          const note = makeNote(data.content || `<p>${text}</p>`, []);
          note.title = data.title || '';
          if (!state.notes[nbId]) state.notes[nbId] = [];
          state.notes[nbId].unshift(note);
          state.activeNotebook = nbId;
          saveState();
          render();
        })
        .catch(() => {
          const note = makeNote(`<p>${text}</p>`, []);
          note.title = 'Voice Note';
          state.notes[state.activeNotebook].unshift(note);
          saveState();
          render();
        })
        .finally(() => btn.classList.remove('processing'));
    };

    rec.onerror = () => {
      btn.classList.remove('recording');
      window._smartRec = null;
    };

    transcript = '';
    btn.classList.add('recording');
    window._smartRec = rec;
    rec.start();
  });
})();

// — MAIN RENDER ——————————————————————————
function render() {
  renderSidebar();
  renderNotes();
}

render();
</script>
