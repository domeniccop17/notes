// — SMART RECORD —————————————————————————
(function() {
  const btn = document.getElementById('smartRecordBtn');
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { btn.style.display = 'none'; return; }

  btn.addEventListener('click', () => {
    if (btn.classList.contains('processing')) return;

    // Stop smart recording
    if (window._smartRec) {
      window._smartRec.stop();
      return;
    }

    // Stop any per-note mic recording
    if (window._activeRec) {
      window._activeRec.stop();
      if (window._activeMicBtn) window._activeMicBtn.classList.remove('recording');
      window._activeRec = null; window._activeMicBtn = null;
    }

    // Capture selection before recording starts
    const sel = window.getSelection();
    const selAnchorTA = sel && !sel.isCollapsed && sel.anchorNode ? sel.anchorNode.parentElement?.closest('.note-textarea') || (sel.anchorNode.nodeType === 1 && sel.anchorNode.closest('.note-textarea')) : null;
    const hasSelection = !!(sel && !sel.isCollapsed && selAnchorTA);
    const savedSelRange = hasSelection ? sel.getRangeAt(0).cloneRange() : null;
    const selectedText = hasSelection ? sel.toString().trim() : '';
    const selTA = selAnchorTA;

    const rec = new SR();
    rec.continuous = true;
    rec.interimResults = true;
    rec.lang = 'en-US';
    let transcript = '';
    let silenceTimer = null;

    const resetSilenceTimer = () => {
      clearTimeout(silenceTimer);
      silenceTimer = setTimeout(() => { if (window._smartRec === rec) rec.stop(); }, 500);
    };

    rec.onresult = ev => {
      for (let i = ev.resultIndex; i < ev.results.length; i++) {
        if (ev.results[i].isFinal) transcript += ev.results[i][0].transcript + ' ';
      }
      resetSilenceTimer();
    };

    rec.onend = () => {
      clearTimeout(silenceTimer);
      btn.classList.remove('recording');
      window._smartRec = null;
      const text = transcript.trim();
      if (!text) return;

      btn.classList.add('processing');
      snapshotForUndo();

      // ── SELECTION MODE: edit only selected text, no notebook/note creation ──
      if (savedSelRange && selectedText && selTA) {
        fetch('https://notes-polish.dcop14c.workers.dev', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, mode: 'note-edit', noteContent: selectedText }),
          signal: AbortSignal.timeout(20000),
        })
          .then(r => r.ok ? r.json() : Promise.reject())
          .then(data => {
            if (data.content) {
              const s = window.getSelection();
              s.removeAllRanges();
              s.addRange(savedSelRange);
              document.execCommand('insertHTML', false, data.content);
              // Sync state
              const noteId = selTA.closest('[data-note-id]')?.dataset.noteId;
              if (noteId) {
                for (const nbId of [state.activeNotebook, state.secondaryNotebook]) {
                  if (!nbId) continue;
                  const n = state.notes[nbId]?.find(n => n.id === noteId);
                  if (n) { n.text = selTA.innerHTML; break; }
                }
              }
              debounceSave();
            }
          })
          .catch(() => {})
          .finally(() => btn.classList.remove('processing'));
        return;
      }

      // ── CHECKLIST TOGGLE: handle "done/check/complete/paid/finished/remove" commands locally ──
      const checklistAction = (() => {
        const lower = text.toLowerCase();
        // Detect intent: checking off a task
        const isCheck = /(?:i(?:'?ve)?|already|just)\s+(?:done|did|paid|finished|completed|ordered|sent|called|booked|bought|fixed|cleaned|submitted|applied|signed|emailed|replied)\b/i.test(lower)
          || /\b(?:check|mark|tick|complete|finish|remove|cross)\s+(?:off?\b)?/i.test(lower)
          || /\b(?:done|finished|completed|paid)\s+(?:with\s+)?/i.test(lower)
          || /\b(?:remove|delete|take off|scratch)\b.*\b(?:to\s*-?\s*do|list|checklist)\b/i.test(lower);
        // Detect intent: unchecking a task
        const isUncheck = /\b(?:uncheck|unmark|undo|bring back|not done|didn'?t|add back|re-?add)\b/i.test(lower);
        if (!isCheck && !isUncheck) return null;

        // Extract the task description by stripping command/filler words
        let d = lower
          .replace(/(?:i(?:'?ve)?|already|just)\s+(?:done|did|paid|finished|completed|ordered|sent|called|booked|bought|fixed|cleaned|submitted|applied|signed|emailed|replied)\s*/gi, '')
          .replace(/\b(?:check|mark|tick|complete|finish|remove|cross)\s*(?:off?\s*)?/gi, '')
          .replace(/\b(?:done|finished|completed|paid)\s*(?:with\s*)?/gi, '')
          .replace(/\b(?:remove|delete|take off|scratch)\s*(?:from\s*)?/gi, '')
          .replace(/\b(?:uncheck|unmark|undo|bring back|not done|didn'?t|add back|re-?add)\s*/gi, '')
          .replace(/\b(?:the|my|a|an|from|to|in|it|on|of|is|and|or|as|do|so|up)\b/gi, '')
          .replace(/\b(?:to\s*-?\s*do\s*(?:list)?|checklist|list)\b/gi, '')
          .replace(/[.,!?;:]+/g, ' ').replace(/\s+/g, ' ').trim();
        if (!d || d.length < 2) return null;
        return { check: isCheck, taskDesc: d };
      })();

      if (checklistAction) {
        // Search all notebooks for matching checklist items
        let matched = false;
        const words = checklistAction.taskDesc.split(/\s+/).filter(w => w.length > 1);
        if (words.length === 0) { /* fall through to AI */ }
        else {
        for (const nbId of Object.keys(state.notes)) {
          const notes = state.notes[nbId] || [];
          for (const n of notes) {
            if (!n.text || !n.text.includes('checklist-item')) continue;
            const div = document.createElement('div');
            div.innerHTML = n.text;
            div.querySelectorAll('.checklist-item').forEach(item => {
              const span = item.querySelector('span');
              const cb = item.querySelector('input[type="checkbox"]');
              if (!span || !cb) return;
              const itemText = span.textContent.toLowerCase();
              // Match: at least half the words appear in the item, or longest word matches
              const hits = words.filter(w => itemText.includes(w));
              const longestWord = words.reduce((a, b) => a.length >= b.length ? a : b, '');
              const hasLongest = itemText.includes(longestWord);
              if (hits.length >= Math.max(1, Math.ceil(words.length * 0.4)) || (hasLongest && longestWord.length >= 4)) {
                if (checklistAction.check && !cb.checked) {
                  cb.checked = true; cb.setAttribute('checked', '');
                  item.classList.add('checked');
                  item.setAttribute('data-checked-at', Date.now());
                  matched = true;
                } else if (!checklistAction.check && cb.checked) {
                  cb.checked = false; cb.removeAttribute('checked');
                  item.classList.remove('checked');
                  item.removeAttribute('data-checked-at');
                  matched = true;
                }
              }
            });
            if (matched) {
              n.text = div.innerHTML;
            }
          }
        }
        if (matched) {
          saveState(); render();
          btn.classList.remove('processing');
          return;
        }
        } // end else (words.length > 0)
        // If no match found, fall through to AI smart mode
      }

      // ── NORMAL SMART MODE — send full notes structure ──
      const activeNb = state.notebooks.find(n => n.id === state.activeNotebook);
      const MAX_CONTENT = 1000;
      const allNotebooks = state.notebooks.map(nb => ({
        name: nb.name,
        active: !!nb.active,
        isTodo: isTodoNotebook(nb),
        notes: (state.notes[nb.id] || []).map(n => ({
          title: n.title || '',
          content: (n.text || '').slice(0, MAX_CONTENT)
        }))
      }));
      // If payload would be too large, truncate non-active notebooks more
      const payloadStr = JSON.stringify(allNotebooks);
      if (payloadStr.length > 50000) {
        allNotebooks.forEach(nb => {
          if (nb.name !== (activeNb ? activeNb.name : '')) {
            nb.notes.forEach(n => { n.content = n.content.slice(0, 200); });
          }
        });
      }
      const payload = {
        text,
        mode: 'smart',
        notebooks: allNotebooks,
        activeNotebook: activeNb ? activeNb.name : ''
      };
      fetch('https://notes-polish.dcop14c.workers.dev', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
        signal: AbortSignal.timeout(20000),
      })
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(data => {
          // ── AI couldn't determine action — do nothing ──
          if (data.action === 'none') {
            btn.classList.remove('processing');
            return;
          }

          // ── CHECK/UNCHECK checklist items across notebooks ──
          if (data.action === 'check' || data.action === 'uncheck') {
            const targetNb = data.notebook
              ? state.notebooks.find(n => n.name.toLowerCase() === data.notebook.toLowerCase())
              : state.notebooks.find(n => n.id === state.activeNotebook);
            if (targetNb && data.items) {
              const notes = state.notes[targetNb.id] || [];
              const note = notes[data.noteIndex ?? 0];
              if (note) {
                const div = document.createElement('div');
                div.innerHTML = note.text;
                const items = div.querySelectorAll('.checklist-item');
                (Array.isArray(data.items) ? data.items : [data.items]).forEach(idx => {
                  const item = items[idx];
                  if (!item) return;
                  const cb = item.querySelector('input[type="checkbox"]');
                  if (!cb) return;
                  if (data.action === 'check') {
                    cb.checked = true; cb.setAttribute('checked', '');
                    item.classList.add('checked');
                    item.setAttribute('data-checked-at', Date.now());
                  } else {
                    cb.checked = false; cb.removeAttribute('checked');
                    item.classList.remove('checked');
                    item.removeAttribute('data-checked-at');
                  }
                });
                note.text = div.innerHTML;
              }
            }
            saveState(); render();
            return;
          }

          // ── EDIT existing note (supports cross-notebook via data.notebook) ──
          if (data.action === 'edit' || (data.noteIndex !== undefined && data.content)) {
            const editNbId = data.notebook
              ? (state.notebooks.find(n => n.name.toLowerCase() === data.notebook.toLowerCase())?.id || state.activeNotebook)
              : state.activeNotebook;
            const idx = data.noteIndex ?? 0;
            const notes = state.notes[editNbId] || [];
            const target = notes[idx] || notes.find(n => n.text.trim());
            if (target) {
              target.text = data.content;
              if (data.title) target.title = data.title;
            }
            render();
            saveState();
            return;
          }

          // ── If AI returned content but no action, and current notebook has notes → treat as edit on first non-empty note ──
          if (!data.action && data.content && !data.notebook) {
            const notes = state.notes[state.activeNotebook] || [];
            const target = notes.find(n => n.text.trim());
            if (target) {
              target.text = data.content;
              if (data.title) target.title = data.title;
              render();
              saveState();
              return;
            }
          }

          // ── CREATE new note ──
          let nbId;
          const nbName = data.notebook;

          if (!nbName || data.isNew) {
            const name = nbName || 'Voice Notes';
            const existing = state.notebooks.find(n => n.name.toLowerCase() === name.toLowerCase());
            if (existing) {
              nbId = existing.id;
            } else {
              nbId = uid();
              const usedC = state.notebooks.map(n => n.color);
              const color = COLORS.find(c => !usedC.includes(c)) || COLORS[state.notebooks.length % COLORS.length];
              state.notebooks.push({ id: nbId, name, color });
              state.notes[nbId] = [];
            }
          } else {
            const existing = state.notebooks.find(n => n.name.toLowerCase() === nbName.toLowerCase());
            if (existing) {
              nbId = existing.id;
            } else {
              nbId = uid();
              const usedC = state.notebooks.map(n => n.color);
              const color = COLORS.find(c => !usedC.includes(c)) || COLORS[state.notebooks.length % COLORS.length];
              state.notebooks.push({ id: nbId, name: nbName, color });
              state.notes[nbId] = [];
            }
          }

          const note = makeNote(data.content || `<p>${text}</p>`, []);
          note.title = data.title || '';
          if (!state.notes[nbId]) state.notes[nbId] = [];
          state.notes[nbId].unshift(note);
          state.activeNotebook = nbId;
          saveState();
          render();
        })
        .catch(() => {
          const note = makeNote(`<p>${text}</p>`, []);
          note.title = 'Voice Note';
          state.notes[state.activeNotebook].unshift(note);
          saveState();
          render();
        })
        .finally(() => btn.classList.remove('processing'));
    };

    rec.onerror = () => {
      btn.classList.remove('recording');
      window._smartRec = null;
    };

    transcript = '';
    btn.classList.add('recording');
    window._smartRec = rec;
    rec.start();
  });
})();

// — MAIN RENDER ——————————————————————————
function render() {
  renderSidebar();
  renderNotes();
  updateTaskDisplay();
}

// — LIVE TASK DISPLAY ———————————————————
function updateTaskDisplay() {
  const inner = document.getElementById('taskDisplayInner');
  if (!inner) return;

  // Collect unchecked tasks from TO DO notebook only
  const tasks = [];
  for (const nbId of Object.keys(state.notes)) {
    const nb = state.notebooks.find(n => n.id === nbId);
    if (!nb || !isTodoNotebook(nb)) continue;
    const nbName = nb.name;
    (state.notes[nbId] || []).forEach(note => {
      if (!note.text) return;
      const d = document.createElement('div');
      d.innerHTML = note.text;
      d.querySelectorAll('.checklist-item').forEach(item => {
        if (item.classList.contains('checked')) return;
        const span = item.querySelector('span');
        const t = span ? span.textContent.replace(/[\u200B\u00A0\uFEFF]/g, '').trim() : '';
        if (!t || !/\w/.test(t)) return;
        const pri = parseInt(item.getAttribute('data-priority') || '0') || 0;
        tasks.push({ text: t, pri, nb: nbName });
      });
    });
  }

  // Sort: high priority first, then medium, then low
  tasks.sort((a, b) => b.pri - a.pri);

  if (!tasks.length) {
    inner.innerHTML = '<span class="task-display-empty">All clear</span>';
    return;
  }

  // Show high priority first; fill remaining space with others
  const high = tasks.filter(t => t.pri >= 3);
  const med = tasks.filter(t => t.pri === 2);
  const low = tasks.filter(t => t.pri < 2);

  // Pick tasks to show: high first, then medium, then random low — max 2
  let show = [...high, ...med];
  if (show.length < 2) {
    const shuffled = low.sort(() => Math.random() - 0.5);
    show = show.concat(shuffled.slice(0, 2 - show.length));
  }
  show = show.slice(0, 2);

  const html = show.map((t, i) => {
    const dotClass = t.pri >= 3 ? 'p3' : t.pri === 2 ? 'p2' : 'p1';
    const priClass = t.pri >= 3 ? 'pri-3' : t.pri === 2 ? 'pri-2' : '';
    const sep = i < show.length - 1 ? '<div class="task-display-sep"></div>' : '';
    return `<div class="task-display-item ${priClass}"><span class="td-dot ${dotClass}"></span><span class="td-text">${t.text}</span></div>${sep}`;
  }).join('');

  inner.innerHTML = html;
}

// Auto-refresh every 30s
setInterval(updateTaskDisplay, 30000);

render();
</script>
