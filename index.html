<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f3ee;
    --surface: #eceae4;
    --border: #d4d0c8;
    --text: #1a1916;
    --muted: #888580;
    --accent: #1a1916;
    --tag-bg: #e0ddd6;
    --danger: #c0392b;
  }

  :root.dark {
    --bg: #1a1916;
    --surface: #222120;
    --border: #3a3835;
    --text: #f5f3ee;
    --muted: #888580;
    --accent: #f5f3ee;
    --tag-bg: #2e2c29;
    --danger: #e05c4a;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* TOP BAR */
  header {
    display: flex;
    align-items: stretch;
    justify-content: space-between;
    padding: 24px 18px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 14px;
  }
  header > div { display: flex; align-items: center; }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* TASK DISPLAY */
  .task-display {
    flex: 1;
    max-width: 520px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px 16px;
    display: flex;
    align-items: center;
    overflow: hidden;
  }
  .task-display-inner {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 16px;
    overflow: hidden;
  }
  .task-display-empty {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--muted);
    opacity: 0.4;
  }
  .task-display-item {
    display: flex;
    align-items: center;
    gap: 7px;
    white-space: nowrap;
    flex-shrink: 0;
    max-width: 240px;
  }
  .task-display-item .td-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .task-display-item .td-dot.p3 { background: #e05c4a; box-shadow: 0 0 5px rgba(224,92,74,0.4); }
  .task-display-item .td-dot.p2 { background: #e8a030; box-shadow: 0 0 5px rgba(232,160,48,0.3); }
  .task-display-item .td-dot.p1 { background: #aaa; }
  .task-display-item .td-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .task-display-item.pri-3 .td-text { color: var(--text); }
  .task-display-item.pri-2 .td-text { color: var(--text); }
  .task-display-sep {
    width: 1px; height: 14px;
    background: var(--border);
    flex-shrink: 0;
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .btn:hover { border-color: var(--text); color: var(--text); }
  .btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn.primary:hover { opacity: 0.8; }

  .btn.icon-btn {
    padding: 5px 9px;
    font-size: 13px;
    line-height: 1;
  }

  /* MAIN LAYOUT */
  .workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 200px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }

  .sidebar-section {
    padding: 16px 16px 8px;
  }

  .sidebar-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .notebook-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.12s;
    font-size: 13px;
    color: var(--text);
    user-select: none;
    position: relative;
  }

  .notebook-item:hover { background: var(--surface); }
  .notebook-item.active { background: var(--tag-bg); }
  .notebook-item.dragging { opacity: 0.35; }
  .notebook-item.drag-over { box-shadow: inset 0 2px 0 var(--accent); }
  .nb-split-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 13px; padding: 0 2px;
    opacity: 0; transition: opacity 0.15s; flex-shrink: 0; line-height: 1;
  }
  .notebook-item:hover .nb-split-btn { opacity: 1; }
  .nb-split-btn.split-active { opacity: 1; color: var(--accent); }

  /* Fixed TO DO card at top of sidebar */
  .todo-fixed-card {
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    margin: 0 4px 0;
    cursor: pointer;
    transition: all 0.15s;
  }
  .todo-fixed-card:hover {
    border-color: var(--muted);
    background: var(--surface);
  }
  .todo-fixed-card.active {
    border-color: var(--accent);
    background: var(--tag-bg);
  }
  .todo-fixed-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text);
    user-select: none;
  }
  .todo-fixed-name {
    font-weight: 600;
    flex: 1;
  }
  .todo-fixed-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .todo-fixed-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
  }
  .todo-fixed-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s ease;
  }
  .todo-separator {
    height: 0;
    border-top: 2px solid var(--muted);
    margin: 14px 0 10px;
    opacity: 0.25;
  }

  /* Active notebook tracking (right-click toggle) */
  .notebook-item.active-notebook {
    border-left: 3px solid var(--accent);
    padding-left: 7px;
    flex-wrap: wrap;
  }
  .notebook-item.active-notebook .active-sidebar-bar {
    width: 100%; height: 3px; background: var(--border);
    border-radius: 2px; overflow: hidden; margin-top: 2px;
  }
  .notebook-item.active-notebook .active-sidebar-fill {
    height: 100%; background: var(--accent); border-radius: 2px;
    transition: width 0.3s ease;
  }
  .notebook-item.active-notebook .notebook-count {
    font-size: 10px;
    background: rgba(124,77,255,0.12);
    padding: 1px 5px;
    border-radius: 8px;
    min-width: auto;
  }

  /* Progress bar in panel header (for TODO + active notebooks) */
  .todo-header-bar {
    width: 100%; height: 4px; background: var(--border);
    border-radius: 2px; overflow: hidden; margin-top: 4px;
  }
  .todo-header-fill {
    height: 100%; border-radius: 2px;
    transition: width 0.3s ease;
  }

  .panel-close-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 16px; padding: 0 4px; line-height: 1;
  }
  .panel-close-btn:hover { color: var(--text); }
  .notes-area + .notes-area { border-left: 1px solid var(--border); }
  .color-swatch.color-used { opacity: 0.2; pointer-events: none; }

  .notebook-dot {
    flex-shrink: 0;
    width: 14px;
    height: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    line-height: 1;
    transition: color 0.2s;
    font-variant-emoji: text;
  }

  .notebook-name {
    flex: 1;
    min-width: 0;
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .notebook-count {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .sidebar-sep {
    height: 1px;
    background: var(--border);
    margin: 8px 16px;
  }

  /* NOTE GRID */
  .notes-area {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .notes-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .notes-title {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #activeNotebookTitle {
    position: relative;
    padding-left: 18px;
  }
  #activeNotebookTitle::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--nb-dot-color, #888);
  }

  .notes-grid {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    overflow: hidden;
  }

  .note-card {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    transition: background 0.15s;
  }

  :root:not(.dark) .note-card:hover { background: #f8f6f1; }
  :root.dark .note-card:hover { background: #1e1d1a; }
  .note-card.dragging { opacity: 0.35; }
  .note-card.drag-over { box-shadow: inset 0 0 0 2px var(--accent); }
  .note-card.mic-active { box-shadow: inset 0 0 0 2px #FF1744; animation: cardpulse 1.2s ease-in-out infinite; }
  @keyframes cardpulse {
    0%,100% { box-shadow: inset 0 0 0 2px rgba(255,23,68,0.6); }
    50% { box-shadow: inset 0 0 0 2px rgba(255,23,68,1); }
  }
  .note-mic-btn { font-size: 14px; }
  .note-mic-btn.recording,
  .note-card .note-mic-btn.recording,
  .note-card:hover .note-mic-btn.recording {
    opacity: 1 !important;
    color: #fff;
    background: #FF1744;
    box-shadow: 0 0 10px rgba(255,23,68,0.6);
    animation: micpulse 0.9s infinite;
  }
  @keyframes micpulse {
    0%,100% { box-shadow: 0 0 10px rgba(255,23,68,0.6); transform: scale(1); }
    50% { box-shadow: 0 0 18px rgba(255,23,68,0.9); transform: scale(1.1); }
  }
  .note-mic-btn.polishing,
  .note-card .note-mic-btn.polishing,
  .note-card:hover .note-mic-btn.polishing {
    opacity: 1 !important; color: #fff; background: #1565C0;
    box-shadow: 0 0 10px rgba(21,101,192,0.6);
    animation: micbreathe 1.4s ease-in-out infinite; cursor: default;
  }
  @keyframes micbreathe {
    0%,100% { box-shadow: 0 0 8px rgba(21,101,192,0.5); }
    50%      { box-shadow: 0 0 18px rgba(21,101,192,0.85); }
  }

  /* SMART RECORD BUTTON */
  .smart-record-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .smart-record-btn:hover { border-color: var(--text); color: var(--text); }
  .smart-record-btn.recording {
    background: #FF1744; color: #fff; border-color: #FF1744;
    box-shadow: 0 0 12px rgba(255,23,68,0.5);
    animation: smartpulse 0.9s infinite;
  }
  .smart-record-btn.processing {
    background: #7C4DFF; color: #fff; border-color: #7C4DFF;
    box-shadow: 0 0 12px rgba(124,77,255,0.5);
    animation: smartbreathe 1.4s ease-in-out infinite;
    cursor: default;
  }
  @keyframes smartpulse {
    0%,100% { box-shadow: 0 0 10px rgba(255,23,68,0.5); }
    50% { box-shadow: 0 0 22px rgba(255,23,68,0.85); }
  }
  @keyframes smartbreathe {
    0%,100% { box-shadow: 0 0 8px rgba(124,77,255,0.4); }
    50% { box-shadow: 0 0 20px rgba(124,77,255,0.8); }
  }

  .note-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .note-title-wrap {
    display: flex;
    align-items: center;
    gap: 3px;
    flex: 1;
    min-width: 0;
  }

  .note-task-count {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    color: var(--muted);
    background: var(--tag-bg);
    border-radius: 8px;
    padding: 1px 6px;
    flex-shrink: 0;
    letter-spacing: 0.03em;
  }

  /* TITLE SUGGESTIONS */
  .title-suggest-btn {
    background: none; border: none; cursor: pointer;
    font-size: 12px; padding: 0 2px; opacity: 0;
    transition: opacity 0.15s; flex-shrink: 0;
    color: var(--muted); line-height: 1;
  }
  .note-header:hover .title-suggest-btn { opacity: 0.5; }
  .note-header:hover .title-suggest-btn:hover { opacity: 1; }
  .title-suggest-btn.loading {
    opacity: 1 !important;
    animation: suggestPulse 0.8s ease-in-out infinite;
  }
  @keyframes suggestPulse {
    0%,100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
  .title-suggest-dropdown {
    display: none;
    position: absolute;
    top: 100%;
    left: 16px;
    right: 16px;
    z-index: 50;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    overflow: hidden;
  }
  .title-suggest-dropdown.visible { display: block; }
  .title-suggest-option {
    padding: 8px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text);
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .title-suggest-option:last-child { border-bottom: none; }
  .title-suggest-option:hover { background: var(--tag-bg); }

  .note-actions {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }

  .note-actions button {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    border: none;
    background: none;
    border-radius: 6px;
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s, background 0.15s;
    flex-shrink: 0;
  }
  .note-card:hover .note-actions button { opacity: 0.5; }
  .note-card:hover .note-actions button:hover { opacity: 1; background: var(--surface); }

  .note-color-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
    cursor: pointer;
  }

  .note-title {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--text);
    text-transform: uppercase;
    background: none;
    border: none;
    outline: none;
    min-width: 40px;
    max-width: 100%;
    cursor: text;
  }

  .note-menu-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 16px;
    padding: 0 2px;
    line-height: 1;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .note-card:hover .note-menu-btn { opacity: 1; }
  .note-clear-btn {
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 0.05em; text-transform: uppercase;
    width: auto !important; padding: 0 8px !important;
  }
  .note-card:hover .note-actions .note-clear-btn:hover { color: var(--danger); }
  .note-delete-btn { font-size: 12px; }
  .note-card:hover .note-actions .note-delete-btn:hover { color: var(--danger); background: rgba(192,57,43,0.1); }

  .note-body {
    flex: 1;
    padding: 14px 16px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .note-textarea {
    width: 100%;
    height: 100%;
    min-height: 80px;
    background: none;
    border: none;
    outline: none;
    resize: none;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 300;
    line-height: 1.8;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .note-textarea::placeholder { color: var(--muted); }
  .note-textarea:empty::before { content: attr(data-placeholder); color: var(--muted); pointer-events: none; display: block; }
  .note-textarea b, .note-textarea strong { font-weight: 900; color: #000; }
  :root.dark .note-textarea b, :root.dark .note-textarea strong { color: #fff; }

  /* CHECKLIST */
  .note-textarea .checklist-item {
    display: flex; align-items: flex-start; gap: 6px; margin: 6px 0;
    width: 100%;
  }
  .note-textarea .checklist-item input[type="checkbox"] {
    margin-top: 4px; cursor: pointer; flex-shrink: 0;
    accent-color: var(--accent);
  }
  .note-textarea .checklist-item.checked span {
    text-decoration: line-through; opacity: 0.5;
  }
  .note-textarea .checklist-item.checked { position: relative; }
  .checklist-copy-btn {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 10px;
    cursor: pointer;
    color: var(--muted);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.12s;
    line-height: 1;
    z-index: 50;
  }
  .checklist-copy-btn.visible {
    opacity: 0.7;
    pointer-events: auto;
  }
  .checklist-copy-btn:hover { opacity: 1; background: var(--tag-bg); }

  /* CHECKLIST SUB-POINTS */
  .note-textarea .checklist-sub {
    display: flex; align-items: flex-start; gap: 4px;
    margin: 1px 0 1px 28px;
    width: calc(100% - 28px);
    font-size: 11px;
    line-height: 1.7;
  }
  .note-textarea .checklist-sub .sub-num {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    opacity: 0.6;
    flex-shrink: 0;
    min-width: 14px;
    user-select: none;
  }
  .note-textarea .checklist-sub span:not(.sub-num) {
    flex: 1; min-width: 0;
  }

  /* Hover progress tooltip for checked items */
  .checklist-expire-tip {
    position: fixed;
    pointer-events: none;
    z-index: 900;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.03em;
    color: var(--muted);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .checklist-expire-tip.visible { opacity: 1; }
  .checklist-expire-tip .expire-bar {
    width: 60px; height: 2px;
    background: var(--border);
    border-radius: 1px;
    margin-top: 2px;
    overflow: hidden;
  }
  .checklist-expire-tip .expire-fill {
    height: 100%; border-radius: 2px;
    transition: width 0.3s, background 0.3s;
  }

  /* PRIORITY LEVELS — default is low (grey), indicator fixed to checkbox height */
  .note-textarea .checklist-item::before {
    content: '';
    width: 2px;
    height: 13px;
    border-radius: 1px;
    background: #888;
    flex-shrink: 0;
    margin-top: 4px;
  }
  .note-textarea .checklist-item[data-priority="2"]::before {
    background: #e8a030;
  }
  .note-textarea .checklist-item[data-priority="2"] span {
    font-weight: 500;
  }
  .note-textarea .checklist-item[data-priority="3"]::before {
    background: #e05c4a;
  }
  .note-textarea .checklist-item[data-priority="3"] span {
    font-weight: 700;
  }

  /* PRIORITY CONTEXT MENU */
  .priority-menu {
    position: fixed;
    z-index: 999;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    overflow: hidden;
    display: none;
    min-width: 130px;
  }
  .priority-menu.visible { display: block; }
  .priority-menu-option {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text);
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;

    sym: ['🍎','🍌','🍊','🍇','🍓','🍋','🥭','🍉','🍑','🍐','🍒','🍍','🫐','🥝','🥥','🍈','🍏','🫒','🍅','🥑'] },
  { kw: ['drink','coffee','tea','juice','soda','smoothie','water','milk','latte','espresso','brew','beverage','cup','mug'],
    sym: ['☕','🍵','🧃','🥤','🧋','🫖','🥛','🍶','🍺','🍻','🥂','🍷','🍸','🍹','🍾','🧊','◉','●','✦','★'] },
];

function usedSymbols(excludeId) {
  return new Set(state.notebooks.filter(n => n.id !== excludeId).map(n => n.symbol).filter(Boolean));
}

function autoSymbol(name, excludeId) {
  const taken = usedSymbols(excludeId);
  const lower = name.toLowerCase();
  let best = null, bestLen = 0;
  for (const cat of SYMBOL_CATS) {
    for (const kw of cat.kw) {
      if (lower.includes(kw) && kw.length > bestLen) {
        best = cat; bestLen = kw.length;
      }
    }
  }
  if (best) {
    const free = best.sym.find(s => !taken.has(s));
    if (free) return free;
  }
  // Fallback: first unused default symbol
  for (const s of DEFAULT_SYMBOLS) {
    if (!taken.has(s)) return s;
  }
  return '●';
}

const DEFAULT_SYMBOLS = ['●','○','◉','■','◆','◇','▲','△','★','☆','✦','✧','✶','✸','✿','❖','♠','♥','♪','◈'];

function suggestSymbols(name, count) {
  const n = count || 20;
  const lower = name.toLowerCase();
  // Score each category by keyword matches
  const scored = SYMBOL_CATS.map(cat => {
    let score = 0, longest = 0;
    for (const kw of cat.kw) {
      if (lower.includes(kw)) { score += kw.length; if (kw.length > longest) longest = kw.length; }
    }
    return { cat, score, longest };
  }).filter(s => s.score > 0).sort((a, b) => b.longest - a.longest || b.score - a.score);
  // Collect from matched categories, then pad with defaults
  const result = [];
  for (const { cat } of scored) {
    for (const s of cat.sym) {
      if (!result.includes(s) && result.length < n) result.push(s);
    }
  }
  for (const s of DEFAULT_SYMBOLS) {
    if (!result.includes(s) && result.length < n) result.push(s);
  }
  return result;
}

// SVG monochrome filter — forces any symbol (including color emoji) to render in a target color
function ensureMonoFilter(hex) {
  const id = 'mono-' + hex.replace('#','');
  if (document.getElementById(id)) return `url(#${id})`;
  let svg = document.getElementById('mono-filters');
  if (!svg) {
    svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.id = 'mono-filters';
    svg.style.cssText = 'position:absolute;width:0;height:0;overflow:hidden';
    document.body.appendChild(svg);
  }
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  const f = document.createElementNS('http://www.w3.org/2000/svg','filter');
  f.id = id;
  f.setAttribute('color-interpolation-filters','sRGB');
  const m = document.createElementNS('http://www.w3.org/2000/svg','feColorMatrix');
  m.setAttribute('type','matrix');
  m.setAttribute('values',
    `0 0 0 0 ${r.toFixed(4)} 0 0 0 0 ${g.toFixed(4)} 0 0 0 0 ${b.toFixed(4)} 0 0 0 1 0`);
  f.appendChild(m);
  svg.appendChild(f);
  return `url(#${id})`;
}

function isColorEmoji(ch) {
  if (!ch) return false;
  if (ch.includes('\uFE0F')) return true; // has emoji presentation selector
  const cp = ch.codePointAt(0);
  if (cp >= 0x1F000) return true;
  return [0x2615,0x2693,0x26F0,0x26F1,0x26F5,0x26FA,0x2708].includes(cp);
}

function dotStyle(sym, color) {
  return isColorEmoji(sym) ? `filter:${ensureMonoFilter(color)}` : `color:${color}`;
}

// — AUTO-DELETE checked checkboxes after 15 min ——
// Timestamps stored as data-checked-at attribute directly on each checklist item
const AUTO_DELETE_MS = 4 * 60 * 60 * 1000;
(function autoDeleteChecked() {
  const now = Date.now();
  let changed = false;
  for (const nbId in state.notes) {
    for (const note of state.notes[nbId]) {
      if (!note.text || !note.text.includes('checklist-item')) continue;
      const div = document.createElement('div');
      div.innerHTML = note.text;
      let noteChanged = false;
      div.querySelectorAll('.checklist-item.checked').forEach(item => {
        const checkedAt = parseInt(item.getAttribute('data-checked-at'), 10);
        if (checkedAt && (now - checkedAt) >= AUTO_DELETE_MS) {
          // Old enough — delete it
          item.remove();
          noteChanged = true;
          changed = true;
        } else if (!checkedAt) {
          // No timestamp (checked before this feature) — stamp it now
          item.setAttribute('data-checked-at', now);
          noteChanged = true;
          changed = true;
        }
      });
      if (noteChanged) note.text = div.innerHTML;
    }
  }
  if (changed) {
    try { localStorage.setItem('notes_app_v2', JSON.stringify(state)); } catch {}
  }
})();

// — Fix checkbox attribute to match .checked class (one-time migration) ——
(function fixCheckboxAttributes() {
  let changed = false;
  for (const nbId in state.notes) {
    for (const note of state.notes[nbId]) {
      if (!note.text || !note.text.includes('checklist-item')) continue;
      const div = document.createElement('div');
      div.innerHTML = note.text;
      let noteChanged = false;
      div.querySelectorAll('.checklist-item').forEach(item => {
        const cb = item.querySelector('input[type="checkbox"]');

        const isChecked = item.classList.contains('checked');
        if (isChecked && !cb.hasAttribute('checked')) {
          cb.setAttribute('checked', '');
          noteChanged = true;
        } else if (!isChecked && cb.hasAttribute('checked')) {
          cb.removeAttribute('checked');
          noteChanged = true;
        }
      });
      if (noteChanged) { note.text = div.innerHTML; changed = true; }
    }
  }
  if (changed) {
    try { localStorage.setItem('notes_app_v2', JSON.stringify(state)); } catch {}
  }
})();

// — Hover progress tooltip for checked-off items ——
(function initExpireTooltip() {
  const tip = document.createElement('div');
  tip.className = 'checklist-expire-tip';
  tip.innerHTML = '<span class="expire-label"></span><div class="expire-bar"><div class="expire-fill"></div></div>';
  document.body.appendChild(tip);

  let _tipTimer = null;

  function fmtTime(ms) {
    const s = Math.max(0, Math.floor(ms / 1000));
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    if (h > 0) return h + 'h ' + m + 'm';
    if (m > 0) return m + 'm';
    return '<1m';
  }

  function updateTip(item) {
    const checkedAt = parseInt(item.getAttribute('data-checked-at'), 10);
    if (!checkedAt) { tip.classList.remove('visible'); return; }
    const elapsed = Date.now() - checkedAt;
    const pct = Math.min(100, (elapsed / AUTO_DELETE_MS) * 100);
    const remaining = Math.max(0, AUTO_DELETE_MS - elapsed);
    tip.querySelector('.expire-label').textContent = remaining <= 0
      ? fmtTime(AUTO_DELETE_MS) + ' / ' + fmtTime(AUTO_DELETE_MS) + '  ·  Done ✅'
      : fmtTime(elapsed) + ' / ' + fmtTime(AUTO_DELETE_MS) + '  ·  ' + fmtTime(remaining) + ' left';
    const fill = tip.querySelector('.expire-fill');
    fill.style.width = pct + '%';
    // Color ramps green → amber → red
    if (pct < 50) fill.style.background = '#4caf50';
    else if (pct < 80) fill.style.background = '#ff9800';
    else fill.style.background = '#e53935';
  }

  function showTip(item, e) {
    updateTip(item);
    tip.style.left = e.clientX + 12 + 'px';
    tip.style.top = e.clientY - 40 + 'px';
    tip.classList.add('visible');
    clearInterval(_tipTimer);
    _tipTimer = setInterval(() => updateTip(item), 1000);
  }

  function hideTip() {
    tip.classList.remove('visible');
    clearInterval(_tipTimer);
    _tipTimer = null;
  }

  // Event delegation on the whole document for checked items
  let _hoveredItem = null;
  document.addEventListener('mouseover', e => {
    const item = e.target.closest('.checklist-item.checked');
    if (item && item !== _hoveredItem) {
      _hoveredItem = item;
      if (item.getAttribute('data-checked-at')) showTip(item, e);
    } else if (!item && _hoveredItem) {
      _hoveredItem = null;
      hideTip();
    }
  });
  document.addEventListener('mousemove', e => {
    if (!_hoveredItem) return;
    tip.style.left = e.clientX + 12 + 'px';
    tip.style.top = e.clientY - 40 + 'px';
  });
  document.addEventListener('mouseout', e => {
    const item = e.target.closest('.checklist-item.checked');
    if (item && item === _hoveredItem) {
      // Check if we're moving to a child — if so, stay
      const related = e.relatedTarget;
      if (related && item.contains(related)) return;
      _hoveredItem = null;
      hideTip();
    }
  });
})();

// — Priority context menu for checklist items ——
(function initPriorityMenu() {
  const menu = document.createElement('div');
  menu.className = 'priority-menu';
  menu.innerHTML = `
    <div class="priority-menu-option" data-pri="0"><span class="pri-dot p1"></span>Low</div>
    <div class="priority-menu-option" data-pri="2"><span class="pri-dot p2"></span>Medium</div>
    <div class="priority-menu-option" data-pri="3"><span class="pri-dot p3"></span>High</div>
  `;
  document.body.appendChild(menu);

  let _targetItem = null;

  function hideMenu() {
    menu.classList.remove('visible');
    _targetItem = null;
  }

  document.addEventListener('contextmenu', e => {
    const item = e.target.closest('.checklist-item');
    if (!item) return;
    e.preventDefault();
    _targetItem = item;

    // Mark the current priority as active
    const curPri = item.getAttribute('data-priority') || '0';
    menu.querySelectorAll('.priority-menu-option').forEach(opt => {
      opt.classList.toggle('active', opt.dataset.pri === curPri);
    });

    // Position menu at cursor
    menu.style.left = e.clientX + 'px';
    menu.style.top = e.clientY + 'px';
    menu.classList.add('visible');

    // Adjust if overflows viewport
    requestAnimationFrame(() => {
      const rect = menu.getBoundingClientRect();
      if (rect.right > window.innerWidth) menu.style.left = (window.innerWidth - rect.width - 8) + 'px';
      if (rect.bottom > window.innerHeight) menu.style.top = (window.innerHeight - rect.height - 8) + 'px';
    });
  });

  menu.addEventListener('click', e => {
    const opt = e.target.closest('.priority-menu-option');
    if (!opt || !_targetItem) return;
    const pri = opt.dataset.pri;
    if (pri === '0') {
      _targetItem.removeAttribute('data-priority');
    } else {
      _targetItem.setAttribute('data-priority', pri);
    }
    // Sync to state
    const ta = _targetItem.closest('.note-textarea');
    if (ta) {
      const noteId = ta.closest('[data-note-id]')?.dataset.noteId;
      if (noteId) {
        for (const id of Object.keys(state.notes)) {
          const note = (state.notes[id] || []).find(n => n.id === noteId);
          if (note) { note.text = ta.innerHTML; saveState(); break; }
        }
      }
    }
    hideMenu();
  });

  document.addEventListener('click', e => {
    if (!menu.contains(e.target)) hideMenu();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') hideMenu();
  });
})();

// — Normalize AI checklist HTML to match expected structure ——
function normalizeChecklist(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  const cbs = div.querySelectorAll('input[type="checkbox"]');
  if (!cbs.length) return html;
  // If already correct (.checklist-item with span), return as-is
  let allCorrect = true;
  cbs.forEach(cb => {
    const item = cb.closest('.checklist-item');
    if (!item || !item.querySelector('span')) allCorrect = false;
  });
  if (allCorrect) return html;
  // Extract text for each checkbox, rebuild in correct format
  const items = [];
  cbs.forEach(cb => {
    const container = cb.closest('.checklist-item') || cb.closest('div, li, p') || cb.parentElement;
    const clone = container.cloneNode(true);
    clone.querySelector('input[type="checkbox"]')?.remove();
    const text = clone.innerHTML.trim() || clone.textContent.trim();
    items.push(text);
  });
  return items.map(text =>
    `<div class="checklist-item"><input type="checkbox"><span>${text}</span></div>`
  ).join('');
}

// — UNDO / REDO (structural actions only) ——
// Text typing undo is handled natively by the browser (contenteditable).
// This system only handles: AI edits, delete note, clear note, smart record.
const undoStack = [];
const redoStack = [];
const MAX_UNDO = 200;
let _isUndoRedoing = false;
let _undoRedoGuardTimer = null;

function snapshotForUndo() {
  if (_isUndoRedoing) return;
  // sync DOM → state
  document.querySelectorAll('.note-textarea').forEach(ta => {
    const noteId = ta.closest('[data-note-id]')?.dataset.noteId;
    if (!noteId) return;
    for (const nbId of [state.activeNotebook, state.secondaryNotebook]) {
      if (!nbId) continue;
      const note = state.notes[nbId]?.find(n => n.id === noteId);
      if (note) { note.text = ta.innerHTML; break; }
    }
  });
  const snap = JSON.stringify(state);
  if (undoStack.length && undoStack[undoStack.length - 1] === snap) return;
  undoStack.push(snap);
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack.length = 0;
}

function structuralUndo() {
  if (!undoStack.length) return;
  _isUndoRedoing = true;
  clearTimeout(_undoRedoGuardTimer);
  // save current for redo
  document.querySelectorAll('.note-textarea').forEach(ta => {
    const noteId = ta.closest('[data-note-id]')?.dataset.noteId;
    if (!noteId) return;
    for (const nbId of [state.activeNotebook, state.secondaryNotebook]) {
      if (!nbId) continue;
      const note = state.notes[nbId]?.find(n => n.id === noteId);
      if (note) { note.text = ta.innerHTML; break; }
    }
  });
  redoStack.push(JSON.stringify(state));
  const prev = JSON.parse(undoStack.pop());
  state.notebooks = prev.notebooks;
  state.notes = prev.notes;
  state.activeNotebook = prev.activeNotebook;
  state.secondaryNotebook = prev.secondaryNotebook;
  try { localStorage.setItem('notes_app_v2', JSON.stringify(state)); } catch {}
  render();
  _undoRedoGuardTimer = setTimeout(() => { _isUndoRedoing = false; }, 1500);
}

function structuralRedo() {
  if (!redoStack.length) return;
  _isUndoRedoing = true;
  clearTimeout(_undoRedoGuardTimer);
  document.querySelectorAll('.note-textarea').forEach(ta => {
    const noteId = ta.closest('[data-note-id]')?.dataset.noteId;
    if (!noteId) return;
    for (const nbId of [state.activeNotebook, state.secondaryNotebook]) {
      if (!nbId) continue;
      const note = state.notes[nbId]?.find(n => n.id === noteId);
      if (note) { note.text = ta.innerHTML; break; }
    }
  });
  undoStack.push(JSON.stringify(state));
  const next = JSON.parse(redoStack.pop());
  state.notebooks = next.notebooks;
  state.notes = next.notes;
  state.activeNotebook = next.activeNotebook;
  state.secondaryNotebook = next.secondaryNotebook;
  try { localStorage.setItem('notes_app_v2', JSON.stringify(state)); } catch {}
  render();
  _undoRedoGuardTimer = setTimeout(() => { _isUndoRedoing = false; }, 1500);
}

function saveState() {
  document.querySelectorAll('.note-textarea').forEach(ta => {
    const noteId = ta.closest('[data-note-id]')?.dataset.noteId;
    if (!noteId) return;
    for (const nbId of [state.activeNotebook, state.secondaryNotebook]) {
      if (!nbId) continue;
      const note = state.notes[nbId]?.find(n => n.id === noteId);
      if (note) { note.text = ta.innerHTML; break; }
    }
  });
  try { localStorage.setItem('notes_app_v2', JSON.stringify(state)); } catch {}
}

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem('notes_app_v2'));
    if (!s || !Array.isArray(s.notebooks) || s.notebooks.length === 0 || !s.notes) return null;
    return s;
  } catch { return null; }
}

// — TO DO progress helper ————————————————
function getTodoProgress(nbId) {
  const notes = state.notes[nbId] || [];
  let total = 0, checked = 0;
  notes.forEach(n => {
    if (!n.text || !n.text.includes('checklist-item')) return;
    const div = document.createElement('div');
    div.innerHTML = n.text;
    div.querySelectorAll('.checklist-item').forEach(item => {
      const span = item.querySelector('span');
      const raw = span ? span.textContent : item.textContent;
      const text = raw.replace(/[\u200B\u00A0\uFEFF]/g, '').trim();
      if (!text || !/\w/.test(text)) return; // skip items without real text
      total++;
      if (item.classList.contains('checked')) checked++;
    });
  });
  return { total, checked };
}

// — RENDER SIDEBAR ————————————————————————
function isTodoNotebook(nb) {
  return nb.name.toLowerCase().replace(/\s+/g, '') === 'todo';
}

function renderSidebar() {
  const list = document.getElementById('notebookList');
  list.innerHTML = '';
  let nbDragSrcId = null;

  // Find and render fixed TODO card at top
  const todoNb = state.notebooks.find(isTodoNotebook);
  if (todoNb) {
    const p = getTodoProgress(todoNb.id);
    const pct = p.total ? Math.round((p.checked / p.total) * 100) : 0;
    const card = document.createElement('div');
    card.className = 'todo-fixed-card' + (todoNb.id === state.activeNotebook ? ' active' : '');
    card.dataset.id = todoNb.id;
    card.innerHTML = `

        <div class="notebook-dot" style="${dotStyle(todoNb.symbol || '●', todoNb.color)}">${todoNb.symbol || '●'}</div>
        <span class="todo-fixed-name">${escHtml(todoNb.name)}</span>

        <div class="todo-fixed-fill" style="width:${pct}%;background:${todoNb.color || 'var(--accent)'}"></div>
      </div>

    card.addEventListener('click', e => {
      if (e.target.closest('.notebook-dot')) { showColorPicker(e.target.closest('.notebook-dot'), todoNb); return; }
      state.activeNotebook = todoNb.id; state.activeNote = 0; saveState(); render();
    });

    list.appendChild(card);

    const sep = document.createElement('div');
    sep.className = 'todo-separator';
    list.appendChild(sep);
  }

  // Split remaining into activated (sorted by activation order) and regular
  const rest = state.notebooks.filter(nb => !isTodoNotebook(nb));
  const activated = rest.filter(nb => nb.active).sort((a, b) => (a.activatedAt || 0) - (b.activatedAt || 0));
  const regular = rest.filter(nb => !nb.active);

  function renderNbItem(nb) {
    const div = document.createElement('div');
    div.className = 'notebook-item' + (nb.id === state.activeNotebook ? ' active' : '') + (nb.active ? ' active-notebook' : '');
    div.draggable = true;

    const isSplit = nb.id === state.secondaryNotebook;

    if (nb.active) {

    div.addEventListener('contextmenu', e => { e.preventDefault(); showNotebookCtx(e, nb); });

    div.addEventListener('dragstart', e => {
      nbDragSrcId = nb.id;
      setTimeout(() => div.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    div.addEventListener('dragend', () => {
      div.classList.remove('dragging');
      list.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    });
    div.addEventListener('dragover', e => {
      e.preventDefault();
      if (nbDragSrcId !== nb.id) div.classList.add('drag-over');
    });
    div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
    div.addEventListener('drop', e => {
      e.preventDefault();
      div.classList.remove('drag-over');
      if (nbDragSrcId === nb.id) return;
      const fromIdx = state.notebooks.findIndex(n => n.id === nbDragSrcId);
      const toIdx = state.notebooks.findIndex(n => n.id === nb.id);
      state.notebooks.splice(toIdx, 0, state.notebooks.splice(fromIdx, 1)[0]);
      saveState(); renderSidebar();
    });

    list.appendChild(div);
  }

  // Render activated notebooks, then regular
  activated.forEach(renderNbItem);
  regular.forEach(renderNbItem);
}

// — RENDER NOTES GRID —————————————————————
function renderPanel(nbId, gridEl, titleEl, countEl) {
  const nb = state.notebooks.find(n => n.id === nbId);
  if (!nb) return;

  titleEl.textContent = nb.name;
  titleEl.style.setProperty('--nb-dot-color', nb.color);
  titleEl.style.cursor = 'pointer';
  titleEl.title = 'Click to rename';
  titleEl.onclick = () => {
    if (titleEl.querySelector('input')) return; // already editing
    const input = document.createElement('input');
    input.value = nb.name;
    input.style.cssText = 'font:inherit;color:inherit;background:transparent;border:none;border-bottom:1px solid var(--muted);outline:none;width:' + Math.max(80, nb.name.length * 10) + 'px;padding:0;';
    titleEl.textContent = '';
    titleEl.appendChild(input);
    input.focus();
    input.select();
    let _nbTitleSelected = true;
    input.addEventListener('mouseup', e => {
      if (_nbTitleSelected) { e.preventDefault(); _nbTitleSelected = false; }
    });
    const _oldNbName = nb.name;
    const save = () => {
      const val = input.value.trim();
      if (val && val !== _oldNbName) { snapshotForUndo(); nb.name = val; saveState(); }
      render();
    };
    input.addEventListener('blur', save);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { input.value = nb.name; input.blur(); }
    });
  };

  const notes = state.notes[nb.id] || [];
  // Show progress info for TODO / active notebooks, entries count for others
  if (isTodoNotebook(nb) || nb.active) {
    const p = getTodoProgress(nb.id);
    const pct = p.total ? Math.round((p.checked / p.total) * 100) : 0;
    const color = nb.color || 'var(--accent)';
    countEl.innerHTML = `<span>${p.total ? p.checked + '/' + p.total + ' tasks done' : '0 tasks'}</span>` +
      `<div class="todo-header-bar"><div class="todo-header-fill" style="width:${pct}%;background:${color}"></div></div>`;
  } else {
    countEl.textContent = notes.filter(n => (n.text || '').trim()).length + ' entries';
  }

  gridEl.innerHTML = '';
  let dragSrcId = null;

  notes.forEach((note, idx) => {
    const card = document.createElement('div');
    card.className = 'note-card';
    card.dataset.noteId = note.id;
    card.dataset.idx = idx;

    // Count unchecked tasks in this note
    const _noteTaskCount = (() => {
      if (!note.text || !note.text.includes('checklist-item')) return 0;
      const d = document.createElement('div'); d.innerHTML = note.text;
      let count = 0;
      d.querySelectorAll('.checklist-item').forEach(item => {
        if (item.classList.contains('checked')) return;
        const span = item.querySelector('span');
        const t = span ? span.textContent.replace(/[\u200B\u00A0\uFEFF]/g, '').trim() : '';
        if (t && /\w/.test(t)) count++;
      });
      return count;
    })();

    card.innerHTML = `
      <div class="note-header" draggable="true">
        <div class="note-title-wrap">
          <div class="note-color-dot" style="background:${nb.color}"></div>
          <input class="note-title" value="${escHtml(note.title || 'Note ' + (idx+1))}" spellcheck="false" />
          <button class="title-suggest-btn" title="AI title suggestions">✨</button>
          <span class="note-task-count" style="display:${_noteTaskCount ? 'inline' : 'none'}">${_noteTaskCount}</span>
        </div>
        <div class="note-actions">
          <button class="note-list-btn" title="AI organize as checklist">☑</button>
          <button class="note-mic-btn" title="Voice to text">🎤</button>
          <button class="note-clear-btn" title="Clear note">clear</button>
          <button class="note-delete-btn" title="Delete note">🗑</button>
        </div>
        <div class="title-suggest-dropdown"></div>
      </div>
      <div class="note-body">
        <div class="note-textarea" contenteditable="true" spellcheck="false" data-placeholder="${PLACEHOLDERS[idx % PLACEHOLDERS.length]}"></div>
      </div>
    `;

    const titleInput = card.querySelector('.note-title');
    function autoSizeTitle() {
      const len = titleInput.value.length || 1;
      titleInput.style.width = (len * 1.05 + 1) + 'ch';
    }
    autoSizeTitle();
    titleInput.addEventListener('input', () => { note.title = titleInput.value; autoSizeTitle(); debounceSave(); });
    // First click selects all, second click places cursor
    let _titleSelected = false;
    titleInput.addEventListener('focus', () => { snapshotForUndo(); titleInput.select(); _titleSelected = true; });
    titleInput.addEventListener('mouseup', e => {
      if (_titleSelected) { e.preventDefault(); _titleSelected = false; }
    });

    // AI Title Suggestions
    const suggestBtn = card.querySelector('.title-suggest-btn');
    const suggestDropdown = card.querySelector('.title-suggest-dropdown');
    suggestBtn.addEventListener('click', async e => {
      e.stopPropagation();
      if (suggestBtn.classList.contains('loading')) return;
      const content = (note.text || '').replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
      if (!content) return;
      suggestBtn.classList.add('loading');
      suggestDropdown.classList.remove('visible');
      try {
        const res = await fetch('https://notes-polish.dcop14c.workers.dev', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: content, mode: 'title-suggest' }),
        });
        const data = await res.json();
        const titles = data.titles || [];
        suggestDropdown.innerHTML = titles.map(t =>
          `<div class="title-suggest-option">${t}</div>`
        ).join('');
        suggestDropdown.classList.add('visible');
        suggestDropdown.querySelectorAll('.title-suggest-option').forEach(opt => {
          opt.addEventListener('click', () => {
            snapshotForUndo();
            const newTitle = opt.textContent;
            titleInput.value = newTitle;
            note.title = newTitle;
            autoSizeTitle();
            debounceSave();
            suggestDropdown.classList.remove('visible');
          });
        });
      } catch (err) {
        console.error('Title suggest error:', err);
      } finally {
        suggestBtn.classList.remove('loading');
      }
    });
    // Close dropdown on click outside
    document.addEventListener('click', e => {
      if (!suggestDropdown.contains(e.target) && e.target !== suggestBtn) {
        suggestDropdown.classList.remove('visible');
      }
    });

    const ta = card.querySelector('.note-textarea');
    ta.innerHTML = note.text;
    const taskCountEl = card.querySelector('.note-task-count');
    function updateTaskCount() {
      let c = 0;
      ta.querySelectorAll('.checklist-item').forEach(item => {
        if (item.classList.contains('checked')) return;
        const span = item.querySelector('span');
        const t = span ? span.textContent.replace(/[\u200B\u00A0\uFEFF]/g, '').trim() : '';
        if (t && /\w/.test(t)) c++;
      });
      taskCountEl.textContent = c;
      taskCountEl.style.display = c ? 'inline' : 'none';
    }
    let _lastSnap = Date.now();
    let _snapTimer = null;
    let _wasEmpty = !(note.text || '').trim();
    ta.addEventListener('input', () => {
      // User is genuinely typing — re-enable undo snapshots
      if (_isUndoRedoing) { _isUndoRedoing = false; clearTimeout(_undoRedoGuardTimer); }
      note.text = ta.innerHTML;
      debounceSave();
      // Snapshot every 1.5s of typing for undo history
      // Also snapshot 1s after typing stops to capture final state
      clearTimeout(_snapTimer);
      const now = Date.now();
      if (now - _lastSnap > 1500) { snapshotForUndo(); _lastSnap = now; }
      _snapTimer = setTimeout(() => { snapshotForUndo(); _lastSnap = Date.now(); }, 1000);
      updateTaskCount();
      // Update sidebar + header count when note toggles between empty/non-empty
      const isEmpty = !ta.textContent.trim() && !ta.querySelector('img');
      if (isEmpty !== _wasEmpty) {
        _wasEmpty = isEmpty;
        renderSidebar();
        // Also refresh the panel header count
        const filledCount = notes.filter(n => (n.text || '').trim()).length;
        if (isTodoNotebook(nb) || nb.active) {
          const p = getTodoProgress(nb.id);
          const pct = p.total ? Math.round((p.checked / p.total) * 100) : 0;
          const color = nb.color || 'var(--accent)';
          countEl.innerHTML = `<span>${p.total ? p.checked + '/' + p.total + ' tasks done' : '0 tasks'}</span>` +
            `<div class="todo-header-bar"><div class="todo-header-fill" style="width:${pct}%;background:${color}"></div></div>`;
        } else {
          countEl.textContent = filledCount + ' entries';
        }
      }
      const arr = state.notes[nb.id];
      const curIdx = arr.indexOf(note);
      if (isEmpty && arr.length > 1 && curIdx < arr.length - 1) {
        snapshotForUndo();
        // Lock in default titles before reordering
        arr.forEach((n, i) => { if (!n.title) n.title = 'Note ' + (i + 1); });
        note.text = '';
        // Keep the locked title
        arr.splice(curIdx, 1);
        arr.push(note);
        saveState(); render();
      }
    });

    // Helper: re-number sub-points after a parent checklist-item
    function renumberSubs(parentItem) {
      let n = 1;
      let sib = parentItem.nextElementSibling;
      while (sib && sib.classList.contains('checklist-sub')) {
        const num = sib.querySelector('.sub-num');
        if (num) num.textContent = n + '.';
        n++;
        sib = sib.nextElementSibling;
      }
    }
    // Find the parent checklist-item for a sub-point
    function findParentItem(sub) {
      let sib = sub.previousElementSibling;
      while (sib) {
        if (sib.classList.contains('checklist-item')) return sib;
        sib = sib.previousElementSibling;
      }
      return null;
    }

    // Backspace in checklist — remove empty item/sub in one press
    ta.addEventListener('keydown', e => {
      if (e.key === 'Backspace') {
        const sel = window.getSelection();
        const anchor = sel?.anchorNode;
        const el = anchor?.nodeType === Node.TEXT_NODE ? anchor.parentElement : anchor;

        // Backspace in sub-point
        const sub = el?.closest('.checklist-sub');
        if (sub) {
          const span = sub.querySelector('span:not(.sub-num)');
          const text = span ? span.textContent.replace(/\u200B/g, '').trim() : '';
          if (text === '') {
            e.preventDefault();
            const prev = sub.previousElementSibling;
            const parent = findParentItem(sub);
            sub.remove();
            if (parent) renumberSubs(parent);
            // Move cursor to end of previous sibling
            const target = prev?.classList.contains('checklist-sub')
              ? prev.querySelector('span:not(.sub-num)')
              : prev?.classList.contains('checklist-item')
                ? prev.querySelector('span')
                : null;
            if (target) {
              const range = document.createRange();
              range.selectNodeContents(target);
              range.collapse(false);
              sel.removeAllRanges();
              sel.addRange(range);
            }
            note.text = ta.innerHTML;
            debounceSave();
          }
          return;
        }

        const item = el?.closest('.checklist-item');
        if (!item) return;
        const span = item.querySelector('span');
        const text = span ? span.textContent.replace(/\u200B/g, '').trim() : '';
        if (text === '') {
          e.preventDefault();
          const prev = item.previousElementSibling;
          item.remove();
          // move cursor to end of previous item or start of textarea
          if (prev && (prev.classList.contains('checklist-item') || prev.classList.contains('checklist-sub'))) {
            const prevSpan = prev.classList.contains('checklist-sub')
              ? prev.querySelector('span:not(.sub-num)')
              : prev.querySelector('span');
            if (prevSpan) {
              const range = document.createRange();
              range.selectNodeContents(prevSpan);
              range.collapse(false);
              sel.removeAllRanges();
              sel.addRange(range);
            }
          }
          note.text = ta.innerHTML;
          debounceSave();
        }
        return;
      }

      // Tab on empty checklist item → convert to sub-point
      if (e.key === 'Tab' && !e.shiftKey) {
        const sel = window.getSelection();
        const anchor = sel?.anchorNode;
        const el = anchor?.nodeType === Node.TEXT_NODE ? anchor.parentElement : anchor;
        const item = el?.closest('.checklist-item');
        if (!item) return;
        const span = item.querySelector('span');
        const text = span ? span.textContent.replace(/\u200B/g, '').trim() : '';
        if (text !== '') return; // Only convert empty items

        e.preventDefault();
        snapshotForUndo();

        // Count existing sub-points above (between previous checklist-item and this item)
        let num = 1;
        let sib = item.previousElementSibling;
        while (sib && sib.classList.contains('checklist-sub')) {
          num++;
          sib = sib.previousElementSibling;
        }

        // Convert checklist-item → checklist-sub
        const subDiv = document.createElement('div');
        subDiv.className = 'checklist-sub';
        subDiv.innerHTML = `<span class="sub-num">${num}.</span><span>\u200B</span>`;
        item.replaceWith(subDiv);

        // Place cursor in the text span
        const newSpan = subDiv.querySelector('span:not(.sub-num)');
        const range = document.createRange();
        range.setStart(newSpan, 0);
        range.collapse(true);
        sel.removeAllRanges();
        sel.addRange(range);
        note.text = ta.innerHTML;
        debounceSave();
        return;
      }

      if (e.key !== 'Enter') return;

      const sel = window.getSelection();
      const anchor = sel?.anchorNode;
      const el = anchor?.nodeType === Node.TEXT_NODE ? anchor.parentElement : anchor;

      // Enter inside a sub-point
      const sub = el?.closest('.checklist-sub');
      if (sub) {
        e.preventDefault();
        const span = sub.querySelector('span:not(.sub-num)');
        const text = span ? span.textContent.replace(/\u200B/g, '').trim() : '';
        if (text === '') {
          // Empty sub → exit sub-point mode, create new checklist item
          snapshotForUndo();
          const parent = findParentItem(sub);
          const newItem = document.createElement('div');
          newItem.className = 'checklist-item';
          newItem.innerHTML = '<input type="checkbox"><span>\u200B</span>';
          sub.replaceWith(newItem);
          if (parent) renumberSubs(parent);
          const newSpan = newItem.querySelector('span');
          const range = document.createRange();
          range.setStart(newSpan, 0);
          range.collapse(true);
          sel.removeAllRanges();
          sel.addRange(range);
          note.text = ta.innerHTML;
          debounceSave();
          return;
        }
        // Non-empty sub → create next numbered sub-point
        snapshotForUndo();
        const curNum = sub.querySelector('.sub-num');
        const nextNum = curNum ? parseInt(curNum.textContent) + 1 : 1;
        const newSub = document.createElement('div');
        newSub.className = 'checklist-sub';
        newSub.innerHTML = `<span class="sub-num">${nextNum}.</span><span>\u200B</span>`;
        sub.after(newSub);
        // Renumber all subs under parent
        const parent = findParentItem(sub);
        if (parent) renumberSubs(parent);
        const newSpan = newSub.querySelector('span:not(.sub-num)');
        const range = document.createRange();
        range.setStart(newSpan, 0);
        range.collapse(true);
        sel.removeAllRanges();
        sel.addRange(range);
        note.text = ta.innerHTML;
        debounceSave();
        return;
      }

      // find if cursor is in a checklist item
      const item = el?.closest('.checklist-item');

      // If cursor is not inside a checklist item, let default Enter work (normal line breaks)
      if (!item) return;

      e.preventDefault();

      // Enter on empty item → exit checklist mode
      if (item) {
        const span = item.querySelector('span');
        const text = span ? span.textContent.replace(/\u200B/g, '').trim() : '';
        if (text === '') {
          snapshotForUndo();
          const normalLine = document.createElement('div');
          normalLine.innerHTML = '<br>';
          item.after(normalLine);
          item.remove();
          const range = document.createRange();
          range.setStart(normalLine, 0);
          range.collapse(true);
          sel.removeAllRanges();
          sel.addRange(range);
          note.text = ta.innerHTML;
          debounceSave();
          return;
        }
      }

      snapshotForUndo();
      const newItem = document.createElement('div');
      newItem.className = 'checklist-item';
      newItem.innerHTML = '<input type="checkbox"><span>\u200B</span>';
      // Insert after the last sub-point of this item (if any)
      let insertAfter = item;
      while (insertAfter.nextElementSibling && insertAfter.nextElementSibling.classList.contains('checklist-sub')) {
        insertAfter = insertAfter.nextElementSibling;
      }
      insertAfter.after(newItem);
      // place cursor in the new span
      const newSpan = newItem.querySelector('span');
      const range = document.createRange();
      range.setStart(newSpan, 0);
      range.collapse(true);
      sel.removeAllRanges();
      sel.addRange(range);
      note.text = ta.innerHTML;
      debounceSave();
    });

    // Copy button — fixed-positioned, never inside contenteditable
    const copyBtn = document.createElement('button');
    copyBtn.className = 'checklist-copy-btn';
    copyBtn.textContent = '⧉';
    copyBtn.title = 'Copy task text';
    document.body.appendChild(copyBtn);
    let _copyTarget = null;

    copyBtn.addEventListener('mousedown', e => {
      e.preventDefault();
      e.stopPropagation();
      if (!_copyTarget) return;
      const span = _copyTarget.querySelector('span:not(.sub-num)') || _copyTarget.querySelector('span');
      const text = span ? span.textContent.replace(/[\u200B\u00A0\uFEFF]/g, '').trim() : '';
      if (text) {
        navigator.clipboard.writeText(text).then(() => {
          copyBtn.textContent = '✓';
          setTimeout(() => { copyBtn.textContent = '⧉'; }, 800);
        });
      }
    });

    function updateCopyBtn() {
      const sel = window.getSelection();
      if (!sel || !sel.anchorNode) { copyBtn.classList.remove('visible'); _copyTarget = null; return; }
      const el = sel.anchorNode.nodeType === Node.TEXT_NODE ? sel.anchorNode.parentElement : sel.anchorNode;
      const item = el?.closest('.checklist-item');
      if (item && ta.contains(item)) {
        _copyTarget = item;
        const span = item.querySelector('span');
        const text = span ? span.textContent.replace(/[\u200B\u00A0\uFEFF]/g, '').trim() : '';
        if (text) {
          // Find position of last character in span
          const textNode = span.lastChild;
          let endRect;
          if (textNode && textNode.nodeType === Node.TEXT_NODE && textNode.textContent.length) {
            const r = document.createRange();
            r.setStart(textNode, textNode.textContent.length - 1);
            r.setEnd(textNode, textNode.textContent.length);
            endRect = r.getBoundingClientRect();
          } else {
            endRect = span.getBoundingClientRect();
          }
          copyBtn.style.left = (endRect.right + 4) + 'px';
          copyBtn.style.top = (endRect.top) + 'px';
          copyBtn.classList.add('visible');
        } else {
          copyBtn.classList.remove('visible');
        }
      } else {
        copyBtn.classList.remove('visible');
        _copyTarget = null;
      }
    }

    ta.addEventListener('keyup', updateCopyBtn);
    ta.addEventListener('mouseup', updateCopyBtn);
    ta.addEventListener('focus', updateCopyBtn);
    ta.addEventListener('blur', () => { setTimeout(() => { copyBtn.classList.remove('visible'); _copyTarget = null; }, 150); });

    // checkbox toggle — click checkbox to strike through + stamp timestamp
    ta.addEventListener('change', e => {
      if (e.target.type === 'checkbox') {
        const item = e.target.closest('.checklist-item');
        if (item) {
          // Ensure text is wrapped in <span> for strikethrough CSS
          if (!item.querySelector('span')) {
            const span = document.createElement('span');
            while (e.target.nextSibling) span.appendChild(e.target.nextSibling);
            item.appendChild(span);
          }
          item.classList.toggle('checked', e.target.checked);
          // Sync checked attribute so innerHTML serialization preserves state
          if (e.target.checked) {
            e.target.setAttribute('checked', '');
            item.setAttribute('data-checked-at', Date.now());
            // Move to end of checklist after a short delay (so user sees the check animation)
            setTimeout(() => {
              // Find the last checklist item in the textarea
              const allItems = [...ta.querySelectorAll('.checklist-item')];
              const lastItem = allItems[allItems.length - 1];
              if (lastItem && lastItem !== item) {
                lastItem.after(item);
              }
              note.text = ta.innerHTML; debounceSave();
            }, 300);
          } else {
            e.target.removeAttribute('checked');
            item.removeAttribute('data-checked-at');
          }
          note.text = ta.innerHTML; debounceSave();
          updateTaskCount();
        }
      }
    });

    // AI list button — organize note content (or selection) as checklist
    const listBtn = card.querySelector('.note-list-btn');
    listBtn.addEventListener('click', e => {
      e.stopPropagation();
      if (listBtn.classList.contains('processing')) return;
      const sel = window.getSelection();
      const hasSelection = sel && !sel.isCollapsed && ta.contains(sel.anchorNode);
      let savedRange = null;
      let content;
      if (hasSelection) {
        // Expand range to cover full checklist-item elements
        const range = sel.getRangeAt(0);
        const expandedRange = range.cloneRange();
        let startNode = range.startContainer;
        const startItem = startNode.nodeType === 1 ? startNode.closest('.checklist-item') : startNode.parentElement?.closest('.checklist-item');
        if (startItem) expandedRange.setStartBefore(startItem);
        let endNode = range.endContainer;
        const endItem = endNode.nodeType === 1 ? endNode.closest('.checklist-item') : endNode.parentElement?.closest('.checklist-item');
        if (endItem) expandedRange.setEndAfter(endItem);
        savedRange = expandedRange;
        // Get HTML of selected region to preserve checklist structure
        const frag = expandedRange.cloneContents();
        const tmp = document.createElement('div');
        tmp.appendChild(frag);
        content = tmp.innerHTML.trim();
      } else {
        content = ta.innerHTML.trim();
      }
      if (!content || content === '<br>') return;

      // Separate checked (done) items — preserve them, only send unchecked to AI
      const contentDiv = document.createElement('div');
      contentDiv.innerHTML = content;
      const checkedItems = [...contentDiv.querySelectorAll('.checklist-item.checked')];
      checkedItems.forEach(item => item.remove());
      const uncheckedContent = contentDiv.innerHTML.trim();
      if (!uncheckedContent || uncheckedContent === '<br>') return;

      listBtn.classList.add('processing');
      snapshotForUndo();
      fetch('https://notes-polish.dcop14c.workers.dev', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: uncheckedContent, mode: 'checklist' }),
        signal: AbortSignal.timeout(20000),
      })
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(data => {
          if (data.content) {
            // Re-append preserved checked items after reorganized unchecked items
            const resultDiv = document.createElement('div');
            resultDiv.innerHTML = normalizeChecklist(data.content);
            checkedItems.forEach(item => resultDiv.appendChild(item));
            const finalHTML = resultDiv.innerHTML;
            if (savedRange) {
              sel.removeAllRanges();
              sel.addRange(savedRange);
              document.execCommand('insertHTML', false, finalHTML);
            } else {
              ta.innerHTML = finalHTML;
            }
            note.text = ta.innerHTML;
            debounceSave();
            updateTaskCount();
          }
        })
        .catch(() => {})
        .finally(() => listBtn.classList.remove('processing'));
    });

    // mic / speech-to-text
    const micBtn = card.querySelector('.note-mic-btn');
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { micBtn.style.display = 'none'; } else {
      micBtn.addEventListener('click', e => {
        e.stopPropagation();
        if (micBtn.classList.contains('polishing')) return;

        // Capture cursor position / selection before recording starts
        const sel = window.getSelection();
        const hasSelection = sel && !sel.isCollapsed && ta.contains(sel.anchorNode);
        const hasCursor = !hasSelection && sel && sel.rangeCount && ta.contains(sel.anchorNode);
        const savedSelRange = hasSelection ? sel.getRangeAt(0).cloneRange() : null;
        const savedCursorRange = hasCursor ? sel.getRangeAt(0).cloneRange() : null;
        const selectedText = hasSelection ? sel.toString().trim() : '';

        // — stop active recording, polish accumulated transcript —
        if (window._activeRec && window._activeMicBtn === micBtn) {
          window._activeRec.stop(); // triggers onend → polishes
          return;
        }
        if (window._activeRec) {
          window._activeRec.stop();
          if (window._activeMicBtn) window._activeMicBtn.classList.remove('recording');
          window._activeRec = null; window._activeMicBtn = null;
        }
        // Cancel smart record if active
        if (window._smartRec) {
          window._smartRec.onend = () => {};
          window._smartRec.stop();
          window._smartRec = null;
          document.getElementById('smartRecordBtn').classList.remove('recording');
        }

        const rec = new SR();
        rec.continuous = true;
        rec.interimResults = true;
        rec.lang = 'en-US';
        let transcript = '';
        let silenceTimer = null;

        const resetSilenceTimer = () => {
          clearTimeout(silenceTimer);
          silenceTimer = setTimeout(() => { if (window._activeRec === rec) rec.stop(); }, 500);
        };

        rec.onresult = ev => {
          for (let i = ev.resultIndex; i < ev.results.length; i++) {
            if (ev.results[i].isFinal) transcript += ev.results[i][0].transcript + ' ';
          }
          resetSilenceTimer();
        };

        rec.onend = () => {
          clearTimeout(silenceTimer);
          micBtn.classList.remove('recording');
          card.classList.remove('mic-active');
          window._activeRec = null; window._activeMicBtn = null;
          const text = transcript.trim();
          if (!text) return;
          micBtn.classList.add('polishing');
          snapshotForUndo();

          const currentContent = ta.innerHTML.trim();
          const hasContent = currentContent && currentContent !== '<br>';

          if (savedSelRange) {
            // Selection mode → AI edit only the selected portion
            fetch('https://notes-polish.dcop14c.workers.dev', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text, mode: 'note-edit', noteContent: selectedText }),
              signal: AbortSignal.timeout(20000),
            })
              .then(r => r.ok ? r.json() : Promise.reject())
              .then(data => {
                if (data.content) {
                  const s = window.getSelection();
                  s.removeAllRanges();
                  s.addRange(savedSelRange);
                  document.execCommand('insertHTML', false, data.content);
                  note.text = ta.innerHTML;
                  debounceSave();
                }
              })
              .catch(() => {
                const s = window.getSelection();
                s.removeAllRanges();
                s.addRange(savedSelRange);
                document.execCommand('insertText', false, text + ' ');
                note.text = ta.innerHTML;
                debounceSave();
              })
              .finally(() => micBtn.classList.remove('polishing'));
          } else {
            // No selection → polish transcript and insert at cursor position
            const insertAtCursor = str => {
              ta.focus();
              if (savedCursorRange) {
                const s = window.getSelection();
                s.removeAllRanges();
                s.addRange(savedCursorRange);
              }
              document.execCommand('insertText', false, str + ' ');
              note.text = ta.innerHTML;
              debounceSave();
            };
            fetch('https://notes-polish.dcop14c.workers.dev', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text }),
              signal: AbortSignal.timeout(15000),
            })
              .then(r => r.ok ? r.json() : Promise.reject())
              .then(data => insertAtCursor(data.polished || text))
              .catch(() => insertAtCursor(text))
              .finally(() => micBtn.classList.remove('polishing'));
          }
        };
        rec.onerror = () => {
          micBtn.classList.remove('recording');
          card.classList.remove('mic-active');
          window._activeRec = null; window._activeMicBtn = null;
        };

        transcript = '';
        micBtn.classList.add('recording');
        card.classList.add('mic-active');
        window._activeRec = rec; window._activeMicBtn = micBtn;
        rec.start();
      });
    }

    card.querySelector('.note-clear-btn').addEventListener('click', e => {
      e.stopPropagation();
      snapshotForUndo();
      // Lock in default titles before reordering so they stay with each note
      const arr = state.notes[nb.id];
      arr.forEach((n, i) => { if (!n.title) n.title = 'Note ' + (i + 1); });
      // Clear DOM first to prevent input handler from re-syncing old content
      ta.innerHTML = '';
      titleInput.value = '';
      note.text = '';
      note.tags = [];
      // Keep the locked title — don't clear it
      const curIdx = arr.indexOf(note);
      if (arr.length > 1 && curIdx < arr.length - 1) {
        arr.splice(curIdx, 1);
        arr.push(note);
      }
      saveState(); render();
    });

    card.querySelector('.note-delete-btn').addEventListener('click', e => {
      e.stopPropagation();
      snapshotForUndo();
      const arr = state.notes[nb.id];
      if (arr.length > 1) {
        state.notes[nb.id] = arr.filter(n => n.id !== note.id);
      } else {
        state.notes[nb.id] = [makeNote()];
      }
      saveState(); renderNotes();
    });

    card.querySelector('.note-header').addEventListener('dragstart', e => {
      dragSrcId = note.id;
      setTimeout(() => card.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      gridEl.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    });
    card.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (dragSrcId !== note.id) card.classList.add('drag-over');
    });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drag-over');
      if (dragSrcId === note.id) return;
      const arr = state.notes[nb.id];
      const fromIdx = arr.findIndex(n => n.id === dragSrcId);
      const toIdx = arr.findIndex(n => n.id === note.id);
      arr.splice(toIdx, 0, arr.splice(fromIdx, 1)[0]);
      saveState(); renderNotes();
    });

    gridEl.appendChild(card);
  });
}

    sw.className = 'color-swatch' + (nb.color===c?' selected':'') + (usedColors.includes(c)?' color-used':'');
    sw.style.background = c;

      e.stopPropagation();
      nb.color = c;
      saveState(); render();
      showColorPicker(anchor, nb);
    });

  });
  picker.appendChild(colorRow);

  // Symbol section — smart suggestions based on notebook name
  const symLabel = document.createElement('div');
  symLabel.className = 'picker-section-label';
  symLabel.textContent = 'Symbol';
  picker.appendChild(symLabel);

  const suggestions = suggestSymbols(nb.name, 20);
  // Fallback: if no suggestions, show a default set
  const syms = suggestions.length ? suggestions : ['●','📌','📋','💡','⭐','📎','🔖','📁','🗂️','📝','🎯','✨','🔔','📊','🏷️','🛠️','💬','📦','🧩','🔮'];
  const symRow = document.createElement('div');
  symRow.className = 'picker-row';
  syms.forEach(s => {
    const sw = document.createElement('div');
    sw.className = 'symbol-swatch' + (nb.symbol === s ? ' selected' : '');
    if (isColorEmoji(s)) {
      sw.style.filter = ensureMonoFilter(nb.color);
    } else {
      sw.style.color = nb.color;
    }
    sw.textContent = s;
    sw.addEventListener('click', e => {
      e.stopPropagation();
      nb.symbol = s;
      saveState(); render();
      picker.classList.add('hidden');
    });
    symRow.appendChild(sw);
  });
  picker.appendChild(symRow);

  const rect = anchor.getBoundingClientRect();
  picker.style.left = rect.left + 'px';
  picker.style.top = (rect.bottom + 6) + 'px';
  picker.classList.remove('hidden');
  colorPickerTarget = nb;
}

// — KEYBOARD SHORTCUTS ————————————————————
(function() {
  let spaceHeld = false;
  document.addEventListener('keydown', e => {
    // Ctrl+Z / Ctrl+Y — always intercept, try native contenteditable undo first, then structural
    if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
      e.preventDefault(); // Always capture — we handle all undo ourselves
      const ce = e.target.closest('[contenteditable]');
      if (ce) {
        const before = ce.innerHTML;
        document.execCommand('undo');
        if (ce.innerHTML !== before) {
          // Check if native undo left any empty checklist items
          const hasEmpty = [...ce.querySelectorAll('.checklist-item')].some(item => {
            const span = item.querySelector('span');
            const text = span ? span.textContent.replace(/[\u200B\u00A0\uFEFF]/g, '').trim() : item.textContent.trim();
            return !text;
          });
          if (hasEmpty && undoStack.length) {
            // Revert native undo and use structural undo to remove entire checkbox
            document.execCommand('redo');
            structuralUndo();
            return;
          }
          // sync DOM back to state
          const noteId = ce.closest('[data-note-id]')?.dataset.noteId;
          if (noteId) {
            for (const nbId of [state.activeNotebook, state.secondaryNotebook]) {
              if (!nbId) continue;
              const note = state.notes[nbId]?.find(n => n.id === noteId);
              if (note) { note.text = ce.innerHTML; debounceSave(); break; }
            }
          }
          return;
        }
      }
      if (undoStack.length) structuralUndo();
      return;
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'y') {
      e.preventDefault(); // Always capture — we handle all redo ourselves
      const ce = e.target.closest('[contenteditable]');
      if (ce) {
        const before = ce.innerHTML;
        document.execCommand('redo');
        if (ce.innerHTML !== before) {
          const noteId = ce.closest('[data-note-id]')?.dataset.noteId;
          if (noteId) {
            for (const nbId of [state.activeNotebook, state.secondaryNotebook]) {
              if (!nbId) continue;
              const note = state.notes[nbId]?.find(n => n.id === noteId);
              if (note) { note.text = ce.innerHTML; debounceSave(); break; }
            }
          }
          return;
        }
      }
      if (redoStack.length) structuralRedo();
      return;
    }
    // Ctrl+G = bold, Ctrl+U = underline, Ctrl+B = bullet list
    if ((e.ctrlKey || e.metaKey) && e.target.closest('[contenteditable]')) {
      if (e.key === 'g' || e.key === 'G') {
        e.preventDefault();
        document.execCommand('bold');
        return;
      }
      if (e.key === 'i' || e.key === 'I') {
        e.preventDefault();
        document.execCommand('italic');
        return;
      }
      if (e.key === 'u' || e.key === 'U') {
        e.preventDefault();
        document.execCommand('underline');
        return;
      }
      if (e.key === 'b' || e.key === 'B') {
        e.preventDefault();
        const sel = window.getSelection();
        if (sel && !sel.isCollapsed) {
          document.execCommand('insertUnorderedList');
        }
        return;
      }
    }
    if (e.altKey && (e.key === 'r' || e.key === 'R')) {
      e.preventDefault();
      document.getElementById('smartRecordBtn').click();
      return;
    }
    if (e.target.closest('input, [contenteditable]')) return;
  });
})();

(function() {
  const toolbar = document.getElementById('formatToolbar');

  function getSelectionInNote() {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || !sel.toString().trim()) return null;
    const node = sel.anchorNode;
    const el = node?.nodeType === Node.TEXT_NODE ? node.parentElement : node;
    if (!el?.closest('.note-textarea')) return null;
    return sel;
  }

  function positionToolbar() {
    const sel = getSelectionInNote();
    if (!sel) { toolbar.style.display = 'none'; return; }
    const rect = sel.getRangeAt(0).getBoundingClientRect();
    toolbar.style.display = 'flex';
    toolbar.style.left = (rect.left + rect.width / 2) + 'px';
    toolbar.style.top = (rect.top + window.scrollY - 44) + 'px';
  }

  document.addEventListener('mouseup', positionToolbar);
  document.addEventListener('keyup', e => {
    if (e.shiftKey || e.key === 'Shift' || (e.key === 'a' && (e.ctrlKey || e.metaKey))) positionToolbar();
  });
  document.addEventListener('selectionchange', () => {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed) toolbar.style.display = 'none';
  });

  function fmtBtn(id, cmd) {
    document.getElementById(id).addEventListener('mousedown', e => {
      e.preventDefault();
      document.execCommand(cmd);
      positionToolbar();
    });
  }
  fmtBtn('fmtBold', 'bold');
  fmtBtn('fmtItalic', 'italic');
  fmtBtn('fmtUnderline', 'underline');
  document.getElementById('fmtBullet').addEventListener('mousedown', e => {
    e.preventDefault();
    document.execCommand('insertUnorderedList');
    toolbar.style.display = 'none';
  });
  document.getElementById('fmtCheck').addEventListener('mousedown', e => {
    e.preventDefault();
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed) return;
    const text = sel.toString();
    const lines = text.split('\n').filter(l => l.trim());
    const html = lines.map(l =>
      `<div class="checklist-item"><input type="checkbox"><span>${l.trim()}</span></div>`
    ).join('');
    document.execCommand('insertHTML', false, html);
    toolbar.style.display = 'none';
  });
})();
